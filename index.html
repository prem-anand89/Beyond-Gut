function buildPatientPrint(c) {
  const { score, sv, conf, driverExtras, patterns, fired, lens, rome, tri, heads, anthro } = c;
  const dateStr = new Date().toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
  const patName = (session.name || '').trim() || (session.ref || '').trim() || 'Anonymous';
  const isPregnant = session.pregnant === 'yes';
  const ageNum = parseInt(session.age, 10);
  const isMinor = !isNaN(ageNum) && ageNum < 18;
  const COUNT_LOADS = new Set(['disruption_load', 'dysbiosis_correlate_load']);

  const div = document.createElement('div');
  let h = `<div class="pr-logo">Beyond Mechanics</div>
    <div class="pr-title">Gut &amp; Systemic Health Screen</div>
    <div class="pr-meta">Prepared for: <b>${esc(patName)}</b>${session.followup ? ' · Follow-up visit' : ' · Baseline screen'}<br>Date: ${esc(dateStr)}</div>
    <hr class="pr-divider">`;

  if (isPregnant || isMinor) {
    const note = isPregnant && isMinor ? 'Pregnant and under 18' : isPregnant ? 'Pregnant' : 'Under 18';
    h += `<div class="pr-info"><b>ℹ️ Note:</b> ${esc(note)}. This screen was developed in a general adult population — discuss results with your clinician before acting.</div>`;
  }
  if (fired.length) {
    h += `<div class="pr-alert"><div class="pr-alert-t">⚠ Please speak with a clinician about the following</div>
      <ul style="margin:4px 0 0 14px;font-size:10.5px">${fired.map(f => `<li>${esc(f.label)}</li>`).join('')}</ul></div>`;
  }

  // ── Section 0 — Clinical impression (auto-synthesis) ───────────────────────
  const imp = clinicalImpression(c);
  h += `<div class="pr-section"><div class="pr-sh">Clinical impression</div>
    <div style="font-size:11px;line-height:1.5">${esc(imp.txt)}</div>
    <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:3px">${esc(imp.caveat)}</div></div>`;

  // ── Section 1 — Your results at a glance (4 primary outputs) ─────────────────
  h += `<div class="pr-section"><div class="pr-sh">Your results at a glance</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">`;
  heads.primaryList.forEach(o => {
    const isCount = COUNT_LOADS.has(o.key);
    const val = o.value == null ? '—' : (isCount ? `${o.value} signal${o.value === 1 ? '' : 's'}` : o.value + '%');
    const valTag = o.validated === true ? 'validated questionnaire' : 'screening estimate';
    h += `<div style="border:1px solid #D9E0E6;border-radius:8px;padding:9px 10px;background:#fff">
      <div style="font-size:11px;font-weight:700;color:#2A3A4A">${esc(o.label)}</div>
      <div style="margin:4px 0"><span style="font-size:15px;font-weight:700">${esc(String(val))}</span>
        ${o.band ? ` <span class="pr-pill" style="background:${ptBandBg(o.band)};color:#000;font-size:9.5px">${esc(o.band)}</span>` : ''}</div>
      <div style="font-size:9.5px;color:#555;line-height:1.4">${esc(PT_HEAD_DESC[o.key] || '')}</div>
      <div style="font-size:8.5px;color:#999;margin-top:3px;font-style:italic">(${valTag})</div>
    </div>`;
  });
  h += `</div>`;
  // Secondary axes — band-only pills, only those that were answered.
  const secPills = heads.secondaryList.filter(o => o.band).map(o =>
    `<span class="pr-pill" style="background:${ptBandBg(o.band)};color:#000;font-size:9.5px;margin:2px 4px 2px 0">${esc(o.label)} — ${esc(o.band)}</span>`).join('');
  if (secPills) {
    h += `<div style="margin-top:8px"><div style="font-size:9.5px;color:#777;margin-bottom:3px">Other systemic reads (screening estimates):</div>${secPills}</div>`;
  }
  h += `</div>`;

  // ── Section 2 — What this means for you (triage + plain notes) ───────────────
  const tierCls = ['', 't1', 't2', 't3', 't4'][tri.level] || 't4';
  const ptNotes = [].concat(
    tri.conditionGuidance || [], tri.familyNotes || [],
    tri.gynNote ? [tri.gynNote] : [], tri.pelvicNote ? [tri.pelvicNote] : [],
    tri.anthroNote ? [tri.anthroNote] : [], tri.medNote ? [tri.medNote] : []);
  h += `<div class="pr-section"><div class="pr-sh">What this means for you</div>
    <div class="pr-triage ${tierCls}">
      <div style="font-weight:700;font-size:12px">Suggested next step: Tier ${tri.level} — ${esc(tri.label)}</div>
      <div style="font-size:11px;margin-top:4px">${esc(tri.action)}</div>
      ${tri.reasons.length ? `<div style="font-size:10.5px;color:#555;margin-top:4px">Why: ${tri.reasons.map(r => esc(r.text)).join(' · ')}</div>` : ''}
      ${ptNotes.length ? `<ul style="margin:6px 0 0 14px;font-size:10.5px;line-height:1.5">${ptNotes.map(n => `<li>ℹ️ ${esc(n)}</li>`).join('')}</ul>` : ''}
    </div>
    <div style="font-size:9.5px;color:#888;margin-top:4px">Confidence: ${esc(conf.level)} · ${score.completeness}% complete</div></div>`;

  // ── Section 3 — Bowel pattern (only if Rome IV-informed criteria met) ────────
  if (rome && rome.criteriaMet && rome.subtype) {
    h += `<div class="pr-section"><div class="pr-sh">Bowel pattern</div>
      <div style="font-size:11px"><b>${esc(rome.subtype)}</b> — ${esc(PT_SUBTYPE_DESC[rome.subtype] || '')}.</div>
      <div style="font-size:9.5px;color:#888;margin-top:3px;font-style:italic">Based on your responses on the day — a pattern to discuss, not a formal diagnosis.</div></div>`;
  }

  // ── Section 4 — Patterns noted (only if any fired) ──────────────────────────
  if (patterns.length) {
    h += `<div class="pr-section"><div class="pr-sh">Patterns noted</div>
      <div style="font-size:10px;color:#555;margin-bottom:4px">Your responses suggest these may be relevant. Your clinician will review them with you.</div>
      <ul style="margin:0 0 0 14px;font-size:10.5px;line-height:1.5">${patterns.map(p => `<li><b>${esc(p.label)}</b>${p.desc ? ` — ${esc(p.desc)}` : ''}</li>`).join('')}</ul></div>`;
  }

  // ── Section 5 — Symptom breakdown (per-area bars) ───────────────────────────
  h += `<div class="pr-section"><div class="pr-sh">Symptom breakdown</div>
    <div style="font-size:9.5px;color:#777;margin-bottom:5px">How your symptoms spread across areas. The gut symptom bars come from a validated questionnaire; the rest are screening estimates.</div>`;
  SECTIONS.forEach(s => {
    const sc = score.secScores[s.id] || 0, mx = score.secApplicableMax[s.id] || 0;
    if (!mx) return;
    const p = Math.round(sc / mx * 100);
    h += `<div class="pr-bar-row"><span style="width:150px;flex:none;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.full || s.label)}</span>
      <div class="pr-bar-track"><div class="pr-bar-fill" style="width:${p}%;background:${s.color || '#0F6E56'}"></div></div>
      <span style="width:34px;flex:none;text-align:right">${p}%</span></div>`;
  });
  h += `</div>`;

  // ── Section 6 — Body measurements (only if entered) ─────────────────────────
  if (anthro && (anthro.bmi != null || anthro.whtr != null)) {
    const bmiTxt = anthro.bmi != null ? `BMI ${anthro.bmi}${anthro.bmiBand ? ` (${anthro.bmiBand})` : ''}` : null;
    const whtrTxt = anthro.whtr != null ? `Waist-to-height ratio ${anthro.whtr}${anthro.whtrBand ? ` (${anthro.whtrBand})` : ''}` : null;
    h += `<div class="pr-section"><div class="pr-sh">Body measurements</div>
      <div style="font-size:10.5px">${esc([bmiTxt, whtrTxt].filter(Boolean).join(' · '))}${anthro.caveat ? `<br><i style="color:#777">${esc(anthro.caveat)}</i>` : ''}</div></div>`;
  }

  // ── Section 7 — Modifiable factors ──────────────────────────────────────────
  const mf = modifiableFactors(driverExtras).filter(f => f.band && f.band !== 'Not answered');
  if (mf.length) {
    // Band shown as a colour swatch + dark, bold text so it stays legible in
    // print (coloured text alone was low-contrast for the lighter bands).
    h += `<div class="pr-section"><div class="pr-sh">Modifiable factors</div>
      <table class="pr-tbl"><tbody>${mf.map(f => `<tr><td style="color:#000">${factorIcon(f)}${esc(f.label)}</td><td style="color:#000"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${f.color};margin-right:6px;vertical-align:middle"></span><b>${esc(f.band)}</b>${f.score ? ` <span style="color:#555">· ${esc(f.score)}</span>` : ''}</td></tr>`).join('')}</tbody></table></div>`;
  }

  h += `<div class="pr-footer">This is a screening tool — it is not a diagnosis. Please discuss your results with your clinician. For the full clinical detail, ask for the clinician summary.<br>Beyond Mechanics · Gut & Systemic Health Screen (GSHS) · ${esc(dateStr)}</div>`;
  div.innerHTML = h;
  return div;
}

// Print band pill (clinician) — colour-coded so the eye lands on the high axes.
function prBandPill(band) {
  if (!band) return '';
  return `<span class="pr-pill" style="background:${ptBandBg(band)};color:#000;font-size:9.5px">${esc(band)}</span>`;
}
// Print provenance tag — validated / part-validated / draft, mirroring provTag().
function prProv(validated) {
  const m = validated === true ? ['validated', '#0F6E56']
    : validated === 'partial' ? ['part. validated', '#7A5800'] : ['draft', '#6B7280'];
  return `<span style="font-size:9px;color:${m[1]}">${m[0]}</span>`;
}

// Bands that warrant clinical attention, shared by the impression + physio callout.
const CONCERN_BANDS = new Set(['Significant', 'Severe', 'Elevated']);

// One- to two-sentence auto-synthesis for the top of the clinician report. Strictly
// a restatement of computed findings — no inference beyond what each axis/pattern
// already says — and always closed with an explicit "screening, not diagnosis"
// caveat so it can never read as a clinical conclusion.
function clinicalImpression(c) {
  const { score, sv, conf, fired, rome, tri, heads } = c;
  const bits = [];
  if (sv && sv.label) bits.push(`${sv.label.toLowerCase()} gut-symptom burden${score.index != null ? ` (index ${score.index}%)` : ''}`);
  if (rome && rome.criteriaMet && rome.subtype) bits.push(`pattern consistent with ${rome.subtype}`);
  const elevated = [];
  if (heads) {
    const nut = heads.primary && heads.primary.nutrient;
    if (nut && CONCERN_BANDS.has(nut.band)) elevated.push('possible malabsorption');
    (heads.secondaryList || []).forEach(o => { if (CONCERN_BANDS.has(o.band)) elevated.push(o.label.toLowerCase()); });
  }
  if (elevated.length) bits.push(`elevated systemic reads (${elevated.join(', ')})`);
  let txt = bits.length ? `${bits.join('; ')}.` : 'No prominent findings on this screen.';
  txt = txt.charAt(0).toUpperCase() + txt.slice(1);
  if (fired && fired.length) txt += ` ⚠ ${fired.length} red-flag item${fired.length > 1 ? 's' : ''} answered Yes (see Red flags).`;
  if (tri) txt += ` Suggested triage: Tier ${tri.level} — ${tri.label}.`;
  const caveat = `Screening synthesis only — not a diagnosis.${conf ? ` Confidence ${conf.level}, ${score.completeness}% complete.` : ''} Apply clinical judgement.`;
  return { txt, caveat };
}

// Pull every pelvic-floor / visceral-fascial manual-therapy candidacy out of the
// triage result (reasons + alsoConsider) — the physio-facing read this tool exists
// to surface. Matches on the axis tag OR the candidacy wording.
function physioCandidacy(tri) {
  const all = [].concat(tri.reasons || [], ...((tri.alsoConsider || []).map(a => a.reasons || [])));
  const seen = new Set();
  return all.filter(r => (r.axis === 'pelvic') || /manual-therapy|visceral|fascial|pelvic-floor/i.test(r.text || ''))
    .filter(r => { if (seen.has(r.text)) return false; seen.add(r.text); return true; });
}

function buildClinicianPrint(c) {
  const { score, sv, conf, driverExtras, patterns, fired, lens, rome, tri, profile, heads, conditions, meds, famhx, obstetric, anthro } = c;
  const dateStr = new Date().toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
  const patName = (session.name || '').trim() || 'Not recorded';
  const priors = priorVisits();
  const trendVisits = loadedVisitId ? priors : priors.concat([currentVisit()]);
  const trend = trendVisits.length >= 2 ? buildTrend(trendVisits) : null;
  const { ROME_FREQ, ROME_ONSET, ROME_ASSOC } = __req('romeiv.js');
  const isPregnant = session.pregnant === 'yes';
  const ageNum = parseInt(session.age, 10);
  const isMinor = !isNaN(ageNum) && ageNum < 18;

  const div = document.createElement('div');
  let h = `<div class="pr-logo">Beyond Mechanics · Gut & Systemic Health Screen (GSHS)</div>
    <div class="pr-title">Clinical Summary</div>
    <div class="pr-meta">
      Patient: <b>${esc(patName)}</b>${session.ref ? ` · Ref: ${esc(session.ref)}` : ''}<br>
      Age: ${esc(session.age || '—')} · Gender: ${esc(session.gender || '—')}${isPregnant ? ' · <b>Pregnant</b>' : ''}${isMinor ? ' · <b>Under 18</b>' : ''}<br>
      Visit: ${session.followup ? 'Follow-up' : 'Baseline'} · Date: ${esc(dateStr)}
    </div><hr class="pr-divider">`;

  if (isPregnant || isMinor) {
    const note = isPregnant && isMinor ? 'Pregnant and under 18' : isPregnant ? 'Pregnant' : 'Under 18';
    h += `<div class="pr-info"><b>Applicability:</b> ${esc(note)}. Developed in a general adult population — interpret with clinical context.</div>`;
  }

  // Clinical impression — auto-synthesis at the top so the report can be scanned.
  const imp = clinicalImpression(c);
  h += `<div class="pr-section"><div class="pr-sh">Clinical impression</div>
    <div style="font-size:11px;line-height:1.5">${esc(imp.txt)}</div>
    <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:3px">${esc(imp.caveat)}</div></div>`;

  // Triage
  const tierCls = ['', 't1', 't2', 't3', 't4'][tri.level] || 't4';
  h += `<div class="pr-section"><div class="pr-sh">Triage</div>
    <div class="pr-triage ${tierCls}">
      <div style="font-weight:700">Tier ${tri.level} — ${esc(tri.label)}</div>
      <div style="margin-top:3px;font-size:11px">${esc(tri.action)}</div>
      ${tri.reasons.length ? `<div style="font-size:10.5px;margin-top:4px">Reasons: ${tri.reasons.map(r => esc(r.text)).join(' · ')}</div>` : ''}
      ${tri.alsoConsider.length ? `<div style="font-size:10.5px;margin-top:3px">Also consider: ${tri.alsoConsider.map(a => `${esc(a.label)} (${a.reasons.map(r => esc(r.text)).join('; ')})`).join(' / ')}</div>` : ''}
      ${[].concat(tri.conditionGuidance || [], tri.familyNotes || [], tri.gynNote ? [tri.gynNote] : [], tri.pelvicNote ? [tri.pelvicNote] : [], tri.anthroNote ? [tri.anthroNote] : [], tri.medNote ? [tri.medNote] : []).map(n => `<div style="font-size:10.5px;margin-top:3px;color:#5A3A10">• ${esc(n)}</div>`).join('')}
    </div>
    ${tri.investigations && tri.investigations.length ? `
      <div style="font-weight:600;font-size:11px;margin:6px 0 3px">Suggested investigations / management:</div>
      <ul style="margin:0 0 4px 14px;font-size:10.5px;line-height:1.6">${tri.investigations.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;color:#888;font-style:italic">Pattern-matched — apply clinical judgement. Not a protocol.</div>
    ` : ''}
  </div>`;

  // Red flags — moved up directly under Triage so the safety read is never buried.
  h += `<div class="pr-section"><div class="pr-sh">Red flags</div>`;
  h += fired.length
    ? `<div class="pr-alert"><div class="pr-alert-t">⚠ ${fired.length} item${fired.length > 1 ? 's' : ''} answered Yes</div>
       <ul style="margin:4px 0 0 14px;font-size:10.5px">${fired.map(f => `<li>${esc(f.label)}</li>`).join('')}</ul></div>`
    : `<div style="font-size:11px;color:#555">No red flags answered Yes.</div>`;
  h += `</div>`;

  // Physiotherapy candidacy — the pelvic-floor / visceral-fascial manual-therapy
  // read foregrounded for the physio audience (otherwise only implicit in patterns).
  const physio = physioCandidacy(tri);
  if (physio.length) {
    h += `<div class="pr-section"><div class="pr-sh">Physiotherapy candidacy</div>
      <ul style="margin:0 0 0 14px;font-size:10.5px;line-height:1.6">${physio.map(r => `<li>${esc(r.text)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:2px">An adjunct after medical assessment — not a substitute for it.</div></div>`;
  }

  // Axis profile — primary + secondary in ONE table with band colour + provenance,
  // so the validated Gut Symptom Burden is visibly distinguished from the draft
  // screening axes. disruption_load / dysbiosis_correlate_load are signal counts
  // (0–6), not percentages; all other axis values are 0–100%.
  const COUNT_LOADS = new Set(['disruption_load', 'dysbiosis_correlate_load']);
  const pctOrCount = (o) => o.value == null ? '—'
    : (o.max != null ? `${o.value}/${o.max}` : (COUNT_LOADS.has(o.key) ? `${o.value} signal${o.value === 1 ? '' : 's'}` : o.value + '%'));
  const axisRow = (o) => `<tr><td>${esc(o.label)}</td><td style="white-space:nowrap"><b>${esc(String(pctOrCount(o)))}</b></td><td>${prBandPill(o.band)}</td><td>${prProv(o.validated)}</td></tr>`;
  h += `<div class="pr-section"><div class="pr-sh">Axis profile</div>
    <table class="pr-tbl"><thead><tr><th>Axis</th><th>Value</th><th>Band</th><th>Basis</th></tr></thead><tbody>
      <tr><td colspan="4" style="font-size:9px;color:#888;font-weight:600">PRIMARY</td></tr>
      ${heads.primaryList.map(axisRow).join('')}
      <tr><td colspan="4" style="font-size:9px;color:#888;font-weight:600;padding-top:4px">SECONDARY</td></tr>
      ${heads.secondaryList.map(axisRow).join('')}
      <tr><td>Confidence</td><td colspan="3">${esc(conf.level)} · ${score.completeness}% complete</td></tr>
      ${score.coreUnknown ? '<tr><td colspan="4" style="color:#A32D2D;font-weight:600">⚠ Core GI section not answered — Gut Symptom Burden provisional</td></tr>' : ''}
    </tbody></table></div>`;
  if (conditions && conditions.list && conditions.list.length) {
    h += `<div class="pr-section"><div class="pr-sh">Known conditions reported</div>
      <div style="font-size:10.5px">${esc(conditions.list.join(', '))}</div></div>`;
  }
  if (famhx && famhx.list && famhx.list.length) {
    h += `<div class="pr-section"><div class="pr-sh">Family history</div>
      <div style="font-size:10.5px">${esc(famhx.list.join(', '))}</div></div>`;
  }
  if (obstetric && obstetric.list && obstetric.list.length) {
    h += `<div class="pr-section"><div class="pr-sh">Obstetric / birth history</div>
      <div style="font-size:10.5px">${esc(obstetric.list.join(', '))}</div></div>`;
  }
  if (anthro && (anthro.bmi != null || anthro.whtr != null)) {
    const bmiTxt = anthro.bmi != null ? `BMI ${anthro.bmi}${anthro.bmiBand ? ` (${anthro.bmiBand})` : ''}` : null;
    const whtrTxt = anthro.whtr != null ? `Waist-to-height ${anthro.whtr}${anthro.whtrBand ? ` (${anthro.whtrBand})` : ''}` : null;
    h += `<div class="pr-section"><div class="pr-sh">Anthropometrics</div>
      <div style="font-size:10.5px">${esc([bmiTxt, whtrTxt].filter(Boolean).join(' · '))}${anthro.caveat ? `<br><i>${esc(anthro.caveat)}</i>` : ''}</div></div>`;
  }
  if (meds && meds.list && meds.list.length) {
    h += `<div class="pr-section"><div class="pr-sh">Medication confounders</div>
      <div style="font-size:10.5px">${esc(meds.list.map(m => m.label + (m.effect ? ` (${m.effect})` : '')).join('; '))}</div></div>`;
  }

  // GSRS domain breakdown — % cell colour-coded by band so high domains stand out.
  h += `<div class="pr-section"><div class="pr-sh">Domain breakdown</div>
    <table class="pr-tbl"><thead><tr><th>Domain</th><th>Score/Max</th><th>%</th></tr></thead><tbody>`;
  SECTIONS.forEach(s => {
    const sc = score.secScores[s.id] || 0, mx = score.secApplicableMax[s.id] || 0;
    const pct = mx ? Math.round(sc / mx * 100) : null;
    const bnd = pct != null ? bandForPct(pct) : null;
    h += `<tr><td>${esc(s.full || s.label)}</td><td>${sc}/${mx}</td><td>${pct != null ? `<b style="color:${bnd.color}">${pct}%</b>` : 'n/a'}</td></tr>`;
  });
  if (score.clusterAgg) {
    ['Reflux', 'Pain', 'Indigestion', 'Diarrhoea', 'Constipation'].forEach(k => {
      const cl = score.clusterAgg[k]; if (!cl || cl.max === 0) return;
      const pct = Math.round(cl.sum / cl.max * 100);
      h += `<tr><td style="padding-left:14px;color:#666">↳ ${esc(k)}</td><td>${cl.sum}/${cl.max}</td><td style="color:${bandForPct(pct).color}">${pct}%</td></tr>`;
    });
  }
  h += `</tbody></table></div>`;

  // Rome IV — full criteria table only when answered; otherwise a single line, so
  // an unanswered Rome IV doesn't print five empty rows.
  const r = extras.rome || {};
  if (rome.answered) {
    h += `<div class="pr-section"><div class="pr-sh">Rome IV-informed bowel-pain pattern</div>
      <table class="pr-tbl"><tbody>
        <tr><td>Pain frequency</td><td>${r.painFreq != null ? `${r.painFreq} — ${esc(ROME_FREQ[r.painFreq] || '')}` : '—'}</td></tr>
        <tr><td>Onset</td><td>${r.onset != null ? `${r.onset} — ${esc(ROME_ONSET[r.onset] || '')}` : '—'}</td></tr>
        ${ROME_ASSOC.map(a => `<tr><td>${esc(a.label)}</td><td>${r[a.id] ? '<b>Yes</b>' : 'No'}</td></tr>`).join('')}
        <tr><td><b>Result</b></td><td><b>${rome.criteriaMet ? `Criteria met — ${esc(rome.subtype)}` : 'Criteria not met'}</b></td></tr>
      </tbody></table>
      <div style="font-size:9.5px;color:#888;margin-top:3px">Single-visit estimate — not the prospective diary Rome IV was validated against.</div>
    </div>`;
  } else {
    h += `<div class="pr-section"><div class="pr-sh">Rome IV-informed bowel-pain pattern</div>
      <div style="font-size:11px;color:#555">Not answered (pain items not reached / completed).</div></div>`;
  }

  // Patterns
  if (patterns.length) {
    h += `<div class="pr-section"><div class="pr-sh">Patterns</div>
      <table class="pr-tbl"><thead><tr><th>Pattern</th><th>Confidence</th><th>Rationale</th></tr></thead><tbody>
        ${patterns.map(p => `<tr><td><b>${esc(p.label)}</b></td><td>${esc(p.confidence)}</td><td>${esc(p.desc)}</td></tr>`).join('')}
      </tbody></table></div>`;
  }

  // Microbiome correlates
  h += `<div class="pr-section"><div class="pr-sh">Microbiome-correlate signals (${lens.count}/6)</div>`;
  h += lens.signals && lens.signals.length
    ? `<ul style="margin:0 0 0 14px;font-size:10.5px">${lens.signals.map(s => `<li>${esc(s.label)}</li>`).join('')}</ul>`
    : `<div style="font-size:11px;color:#555">No microbiome-correlate signals present.</div>`;
  h += `</div>`;

  // Modifiable drivers
  h += `<div class="pr-section"><div class="pr-sh">Modifiable drivers</div>
    <table class="pr-tbl"><thead><tr><th>Factor</th><th>Band</th><th>Score</th></tr></thead><tbody>
      ${modifiableFactors(driverExtras).map(f => `<tr><td>${factorIcon(f)}${esc(f.label)}</td><td style="color:${f.color}">${esc(f.band)}</td><td>${esc(f.score || '')}</td></tr>`).join('')}
    </tbody></table></div>`;

  // Item-level responses (page 2) — two columns to roughly halve the footprint.
  h += `<div class="pr-section pr-page-break"><div class="pr-sh">Item-level responses</div>
    <div style="column-count:2;column-gap:16px">`;
  SECTIONS.forEach(s => {
    const qs = questionsOf(s.id);
    if (!qs.length) return;
