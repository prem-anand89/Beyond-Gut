<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Beyond Mechanics · Gut & Systemic Health Screen (GSHS)</title>
<style>/* ============================================================================
   gut_screen.html (v2) — clean-slate rebuild. Questionnaire + scoring only.
   Single self-contained offline file. Palette ported from BM_Gut_Suite v7.
   ========================================================================== */
:root{
  --g:#0F6E56;--gm:#1D9E75;--gl:#5DCAA5;--gp:#E1F5EE;--gf:#F4FBF7;
  --am:#BA7517;--ap:#FAEEDA;--re:#A32D2D;--rp:#FCEBEB;
  --pu:#534AB7;--pp:#EEEDFE;--bl:#185FA5;--blp:#E6F1FB;
  --ink:#1A1A17;--inks:#3A3A37;--inkt:#707070;
  --bdr:#E0DDD6;--bdrm:#C0BDB6;--bg:#F5F3EE;--surf:#FFFFFF;--surf2:#FAFAF8;
  --r6:6px;--r8:8px;--r12:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh;-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:var(--font)}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer}
small{font-size:.82em}

.app-bar{background:var(--g);color:#fff;display:flex;align-items:center;gap:12px;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));position:sticky;top:0;z-index:500;box-shadow:0 1px 0 rgba(0,0,0,.08);flex-wrap:wrap}
.app-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:21px;letter-spacing:-.01em;white-space:nowrap}
.app-logo .dot{width:11px;height:11px;border-radius:50%;background:var(--gl);box-shadow:0 0 0 4px rgba(93,202,165,.25)}
.app-sub{display:block;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.82)}
.app-name-wrap{display:flex;flex-direction:column;gap:1px;line-height:1.15}
/* Thin live progress strip along the bottom edge of the (sticky) header. */
.app-progress{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,.18)}
.app-progress-fill{height:100%;width:0;background:var(--gl);transition:width .25s ease}
/* Form intro: question count / time estimate + live answered counter. */
.form-meta{background:var(--gf);border:1px solid var(--gl);border-radius:var(--r8);padding:9px 13px;margin-bottom:12px;font-size:12.5px;color:var(--inks);display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.form-meta b{color:var(--g)}
.app-spacer{flex:1}
.app-tag{font-size:10.5px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.13);border-radius:20px;padding:4px 10px}

.wrap{max-width:880px;margin:0 auto;padding:16px}
.btn{border:none;border-radius:var(--r8);font-size:13px;font-weight:600;padding:9px 15px;transition:all .15s;white-space:nowrap}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:var(--gm)}
.btn-o{background:var(--surf);color:var(--g);border:1px solid var(--g)}.btn-o:hover{background:var(--gp)}
.btn-gh{background:transparent;color:var(--inkt);border:1px solid var(--bdr)}.btn-gh:hover{background:var(--surf);color:var(--ink)}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:16px;margin-bottom:14px}
.muted{color:var(--inkt)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
h1{font-size:22px}h2{font-size:17px;margin-bottom:8px}h3{font-size:14px}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700}
.sev-min{background:var(--gp);color:#085041}.sev-mod{background:var(--ap);color:#7A5800}
.sev-sig{background:var(--cop,#FAECE7);color:#7A3410}.sev-sev{background:var(--rp);color:#7A1515}

.intro{background:var(--gf);border:1px solid var(--gl);border-radius:var(--r12);padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--inks)}
.sec-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);margin-bottom:12px;overflow:hidden}
.sec-head{padding:11px 15px;font-weight:700;font-size:13px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.sec-body{padding:6px 15px 12px}
.q{padding:11px 0;border-bottom:1px solid var(--surf2)}
.q:last-child{border-bottom:none}
.q-txt{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px}
.q-sub{font-size:11.5px;color:var(--inkt);margin-bottom:8px}
.opts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.opt{border:1.5px solid var(--bdr);background:var(--surf);border-radius:8px;padding:9px 6px;text-align:center;font-size:11.5px;font-weight:600;color:var(--inks);line-height:1.25;transition:all .12s}
.opt:hover{border-color:var(--bdrm)}
.opt .on{display:block;font-size:14px;font-weight:800;margin-bottom:2px}
/* Generic selected state for segmented rows that carry no s{v} colour class
   (diet/lifestyle, sleep, the abx/stool/gas microbiome rows). The s0–s4 rules
   below are more specific, so colour-coded items still win. */
.opt.sel{border-color:var(--g);background:var(--gp);color:var(--g)}
.opt.s0.sel{border-color:#0F6E56;background:#E1F5EE;color:#085041}
.opt.s1.sel{border-color:#BA7517;background:#FCEFCF;color:#7A5800}
.opt.s2.sel{border-color:#C2622E;background:#FAD7C2;color:#7A3410}
.opt.s3.sel{border-color:#A32D2D;background:#F7CBCB;color:#7A1515}
.opt.s4.sel{border-color:#A32D2D;background:#F7CBCB;color:#7A1515}
@media(max-width:520px){.opts{grid-template-columns:repeat(2,1fr)}}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip-opt{border:1.5px solid var(--bdr);background:var(--surf);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--inks)}
.chip-opt.sel{border-color:var(--g);background:var(--gp);color:var(--g)}
.opt-tag{display:inline-block;font-size:9px;font-weight:700;color:var(--bl);background:var(--blp);border-radius:9px;padding:1px 7px;margin-left:4px;text-transform:uppercase;letter-spacing:.03em;vertical-align:middle}
.na-wrap{margin-top:6px}
.na-opt{font-size:11px;padding:5px 12px}
.na-opt.sel{border-color:var(--inkt);background:#ECEAE4;color:var(--inks)}
/* instruments (modifiable drivers) */
.bristol-grid{display:grid;grid-template-columns:1fr;gap:6px}
.bristol-opt{display:flex;gap:10px;align-items:center;border:1.5px solid var(--bdr);border-radius:8px;padding:9px 12px;background:var(--surf);text-align:left;width:100%}
.bristol-opt.sel{border-color:var(--g);background:var(--gp)}
.bristol-n{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.bristol-ic{flex-shrink:0;display:inline-block;vertical-align:middle}
.nrs-row{display:flex;gap:4px;flex-wrap:wrap}
.nrs-opt{flex:1;min-width:30px;border:1.5px solid var(--bdr);background:var(--surf);border-radius:7px;padding:9px 0;text-align:center;font-weight:700;font-size:13px;color:var(--inks)}
.nrs-opt.sel{border-color:var(--re);background:#FCEBEB;color:var(--re)}
.grp-label{font-size:10px;font-weight:700;color:var(--inkt);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 4px}
.drivers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:520px){.drivers{grid-template-columns:repeat(2,1fr)}}
.driver{border:1px solid var(--bdr);border-radius:9px;padding:8px;background:var(--surf2);text-align:center}
.driver .dv{font-size:15px;font-weight:700}
.driver .dl{font-size:9.5px;color:var(--inkt);margin-top:2px}

.hero{display:flex;align-items:center;gap:20px;background:var(--gf);border:1px solid var(--gl);border-radius:var(--r12);padding:18px;flex-wrap:wrap}
.hero .big{font-size:42px;font-weight:800;line-height:.95;color:var(--g)}
.hero .sub{font-size:11px;color:var(--inkt)}
.bar-row{margin:7px 0}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-track{height:8px;background:#F0EFEA;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.conf-note{font-size:11.5px;color:var(--inkt);margin-top:8px;line-height:1.45}
.prov-caveat{background:#FFF6E7;border:1px solid var(--am);border-radius:var(--r8);padding:8px 11px;font-size:11.5px;color:#5C4406;margin-top:8px;line-height:1.45}

.rf-banner{background:var(--rp);border:1.5px solid var(--re);border-radius:var(--r12);padding:13px 15px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.rf-ic{font-size:20px;flex-shrink:0;line-height:1.2}
.rf-title{font-size:13.5px;font-weight:700;color:var(--re);margin-bottom:3px}
.rf-body{font-size:12px;color:#5A1414;line-height:1.5}
.rf-list{margin:6px 0 0 16px;padding:0;font-size:11.5px;color:#5A1414}

.empty-note{text-align:center;padding:40px 20px;color:var(--inkt);font-size:13px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;box-shadow:0 6px 24px rgba(0,0,0,.25);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.ov{position:fixed;inset:0;background:rgba(20,20,18,.46);z-index:10000;display:none;align-items:center;justify-content:center;padding:18px}
.ov.show{display:flex}
.dlg{background:var(--surf);border-radius:16px;width:100%;max-width:400px;box-shadow:0 18px 50px rgba(0,0,0,.3);overflow:hidden}
.dlg-h{font-size:16px;font-weight:700;padding:18px 20px 4px}
.dlg-m{font-size:13px;color:var(--inks);padding:0 20px 8px;line-height:1.5;white-space:pre-line}
.dlg-b{padding:6px 20px}
.dlg-b input{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:10px;font-size:16px;margin-bottom:10px}
.dlg-acts{display:flex;gap:9px;padding:10px 20px 18px}
.dlg-acts .btn{flex:1;padding:12px}
/* mode switch (tab nav) */
.mode-switch{display:flex;background:rgba(255,255,255,.13);border-radius:20px;padding:2px;gap:2px}
.mode-btn{border:none;background:transparent;color:rgba(255,255,255,.78);font-size:12px;font-weight:600;padding:6px 14px;border-radius:18px;transition:all .15s;white-space:nowrap;cursor:pointer}
.mode-btn.active{background:#fff;color:var(--g)}
.mode{display:none}.mode.show{display:block}
.app-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);border-radius:20px;padding:4px 6px 4px 12px;font-size:12px;font-weight:600;color:#fff;max-width:240px}
.app-chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.app-chip .x{background:rgba(255,255,255,.2);border:none;color:#fff;width:18px;height:18px;border-radius:50%;font-size:11px;line-height:1;flex-shrink:0;cursor:pointer}
/* patient records */
.db-search{flex:1;min-width:180px;padding:9px 13px;border:1px solid var(--bdr);border-radius:var(--r8);font-size:14px;background:var(--surf)}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.db-empty{text-align:center;color:var(--inkt);padding:48px 16px;line-height:1.8}
.pt-card{position:relative;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:14px;cursor:pointer;transition:all .15s}
.pt-card:hover{border-color:var(--g);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.pt-del{position:absolute;top:8px;right:8px;border:none;background:transparent;color:var(--inkt);font-size:13px;cursor:pointer;border-radius:6px;padding:2px 6px}
.pt-del:hover{background:#FCEBEB;color:var(--re)}
.pt-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pt-av{width:38px;height:38px;border-radius:50%;background:var(--gp);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.pt-name{font-weight:700;font-size:14px}.pt-meta{font-size:11px;color:var(--inkt)}
.pt-stats{display:flex;gap:8px}
.pt-stat{flex:1;text-align:center;background:var(--gf);border-radius:8px;padding:8px 4px}
.pt-stat .v{font-weight:800;font-size:16px}.pt-stat .l{font-size:9.5px;color:var(--inkt);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.back-btn{border:none;background:transparent;color:var(--g);font-weight:600;font-size:13px;cursor:pointer;padding:6px 0}
.visit-card{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:12px 14px;margin-bottom:10px;flex-wrap:wrap}
.visit-card.latest{border-color:var(--g);background:var(--gf)}
.visit-num{width:26px;height:26px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:none}
.visit-info{flex:1;min-width:140px}.visit-date{font-weight:600;font-size:13px}.visit-sub{font-size:11px;color:var(--inkt);margin-top:1px}
.visit-score{text-align:center}.visit-score .v{font-weight:800;font-size:17px}.visit-score .l{font-size:10px;color:var(--inkt)}
.delta-down{color:#0F6E56}.delta-up{color:#A32D2D}.delta-flat{color:#999}

/* ── Clinician view ──────────────────────────── */
.clin-badge{display:inline-block;padding:2px 8px;background:#3A4A5A;color:#fff;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.clin-detail{background:#F5F7FA;border:1px solid #C0C8D2;border-radius:var(--r12);padding:16px;margin-bottom:14px}
.clin-detail .clin-h{font-size:11.5px;font-weight:700;color:#3A4A5A;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #D0D7DF;padding-bottom:3px;margin:12px 0 6px}
.clin-detail .clin-h:first-of-type{margin-top:0}
.clin-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.clin-tbl th{text-align:left;padding:4px 8px;background:#EAEDF0;font-weight:600;font-size:11px}
.clin-tbl td{padding:4px 8px;border-bottom:1px solid #E8EAED;vertical-align:top}
.clin-tbl tr:last-child td{border-bottom:none}

/* ── Print layout ────────────────────────────── */
#print-area{display:none}
@media print{
  header,.toast,.ov,.mode{display:none!important}
  #print-area{display:block!important;font-size:11.5px;line-height:1.5;color:#000;background:#fff;padding:10mm}
  /* Force background colours to render in print/PDF — browsers strip them by
     default, which blanked the By-area bar fills, hero, triage and pill swatches. */
  #print-area,#print-area *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .pr-logo{font-size:14px;font-weight:700;color:#0F6E56}
  .pr-title{font-size:20px;font-weight:800;margin:3px 0 2px}
  .pr-meta{font-size:10.5px;color:#555;margin-bottom:10px;line-height:1.7}
  hr.pr-divider{border:none;border-top:1.5px solid #D0D0C8;margin:10px 0}
  .pr-section{margin-bottom:12px}
  .pr-sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#3A4A5A;border-bottom:1px solid #D0D0C8;padding-bottom:3px;margin-bottom:6px}
  .pr-hero{display:flex;gap:14px;align-items:center;background:#F4FBF7;border:1px solid #5DCAA5;border-radius:8px;padding:10px 12px;margin-bottom:8px}
  .pr-hero .big{font-size:36px;font-weight:800;color:#0F6E56;line-height:.95}
  .pr-hero .sub{font-size:10px;color:#555;margin-top:2px}
  .pr-pill{display:inline-block;padding:2px 8px;border-radius:14px;font-size:10px;font-weight:700;margin-right:3px}
  .pr-bar-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:10.5px}
  .pr-bar-track{flex:1;height:6px;background:#EEECEA;border-radius:3px;overflow:hidden}
  .pr-bar-fill{height:100%;border-radius:3px}
  .pr-alert{background:#FCEBEB;border:1px solid #A32D2D;border-radius:6px;padding:8px 10px;margin-bottom:8px}
  .pr-alert-t{font-weight:700;color:#A32D2D;font-size:11.5px;margin-bottom:2px}
  .pr-info{background:#FFF3CD;border:1px solid #FECB1F;border-radius:6px;padding:8px 10px;margin-bottom:8px}
  .pr-triage{border-radius:6px;padding:8px 10px;margin-bottom:8px;border:1px solid #ccc}
  .pr-triage.t1{background:#FCEBEB;border-color:#A32D2D}.pr-triage.t2{background:#FAD7C2;border-color:#C2622E}
  .pr-triage.t3{background:#FAEEDA;border-color:#BA7517}.pr-triage.t4{background:#E1F5EE;border-color:#0F6E56}
  .pr-tbl{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:2px}
  .pr-tbl th{text-align:left;padding:3px 6px;background:#F2F0EB;font-weight:600;border-bottom:1px solid #D0D0C8;font-size:10px}
  .pr-tbl td{padding:3px 6px;border-bottom:1px solid #ECEAEA;vertical-align:top}
  .pr-tbl tr:last-child td{border-bottom:none}
  .pr-footer{font-size:9px;color:#999;margin-top:14px;padding-top:8px;border-top:1px solid #D0D0C8;text-align:center}
  .pr-page-break{page-break-before:always}
}
</style>
</head>
<body>
<header class="app-bar">
  <div class="app-logo"><span class="dot"></span><span class="app-name-wrap">Gut &amp; Systemic Health Screen<span class="app-sub">Beyond Mechanics · GSHS</span></span></div>
  <div class="app-spacer"></div>
  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="patient" type="button">Questionnaire</button>
    <button class="mode-btn" data-mode="clinician" type="button">Clinician</button>
    <button class="mode-btn" data-mode="record" type="button">Patient records</button>
  </div>
  <div class="app-chip" id="activeChip" style="display:none"><span class="nm" id="activeName"></span><button class="x" id="activeClear" type="button" title="Clear patient">✕</button></div>
  <div class="app-progress" id="appProgress" style="display:none"><div class="app-progress-fill" id="appProgressFill"></div></div>
</header>
<main>
  <section id="mode-patient" class="mode show wrap"></section>
  <section id="mode-clinician" class="mode wrap"></section>
  <section id="mode-record" class="mode wrap"></section>
</main>
<div class="toast" id="toast"></div>
<div class="ov" id="overlay"><div class="dlg" id="dlg"></div></div>
<div id="print-area"></div>
<script>

const __modules = {}; const __cache = {};
function __req(name){ if(__cache[name]) return __cache[name]; const e = __cache[name] = {}; __modules[name](e); return e; }

   util.js — tiny shared UI helpers. Ported from BM_Gut_Suite v1.

    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v != null) n.setAttribute(k, v);
  }
  if (html != null) n.innerHTML = html;
  return n;
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function fmtDate(ts) {
  if (!ts) return '—';
  try { return new Date(ts).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return '—'; }
}
let toastTimer;
function toast(msg) {
  const t = $('#toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2600);

const overlay = () => $('#overlay');

function openDlg(html) { dlgBox().innerHTML = html; overlay().classList.add('show'); }
function closeDlg() { overlay().classList.remove('show'); }
function dialogConfirm(message, { title = '', okLabel = 'OK', danger = false } = {}) {
  return new Promise(resolve => {
    openDlg(`
      ${title ? `<div class="dlg-h">${esc(title)}</div>` : ''}

  grid.appendChild(el('div', {}, ''));
  grid.appendChild(el('div', { style: 'font-weight:600;text-align:center;color:var(--inks)' }, 'Low correlate'));
  grid.appendChild(el('div', { style: 'font-weight:600;text-align:center;color:var(--inks)' }, 'High correlate'));
  [['High severity', 'H'], ['Low severity', 'L']].forEach(([rlab, rs]) => {
    grid.appendChild(el('div', { style: 'font-weight:600;display:flex;align-items:center;color:var(--inks)' }, rlab));
    ['L', 'H'].forEach(cs => {
      const k = rs + cs, cell = CELLS[k], active = k === activeKey;
      grid.appendChild(el('div', { style:
        `padding:8px;border-radius:6px;text-align:center;line-height:1.3;` +
        `background:${active ? cell.c : '#F2F4F7'};color:${active ? '#fff' : '#8A93A0'};` +
        `font-weight:${active ? '600' : '400'};border:${active ? '2px solid ' + cell.c : '1px solid #E1E5EB'}` },
        esc(cell.t) + (active ? ' ◀ you' : '')));
    });
  });
  card.appendChild(grid);

  if (micro.count > 0) {
    card.appendChild(el('div', { class: 'q-sub', style: 'margin-top:10px;font-weight:600' }, 'Dysbiosis-correlate signals:'));
    card.appendChild(el('ul', { class: 'rf-list' }, micro.signals.map(s => `<li>${esc(s.label)}</li>`).join('')));
  }
  card.appendChild(el('div', { class: 'q-sub', style: 'margin-top:8px;font-style:italic;color:#999' },
    'Two independent reads — symptom severity (GI score) and an inferred dysbiosis-correlate count (NOT a dysbiosis diagnosis; validate against stool testing). For discussion, not prescription.'));
  return card;
}

// Longitudinal trend card — burden + cluster trajectory across this patient's
// visits, with visit-to-visit delta and pattern persistence. `markLastUnsaved`
// labels the final point as the current in-progress (preview) visit.
function trendCard(visits, markLastUnsaved) {
  const { points, persistent, latest } = buildTrend(visits);
  const card = el('div', { class: 'card', id: 'trend-card', style: 'border-left:6px solid #185FA5' });
  card.appendChild(el('h2', {}, 'Progress over time'));
  card.appendChild(el('div', { class: 'q-sub' },
    `${points.length} visit${points.length > 1 ? 's' : ''}${session.ref ? ' · ' + esc((session.ref || '').trim()) : ''}. Lower GI Symptom Burden = improvement.`));

  // Headline delta vs previous visit.
  if (latest && latest.delta) {
    const d = latest.delta;
    card.appendChild(el('div', { class: 'row', style: 'align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap' },
      `<span class="pill" style="background:${d.color};color:#fff">${esc(d.label)}</span>
       <span style="font-size:13px;color:var(--inks)">Burden ${d.delta > 0 ? '+' : ''}${d.delta} pts vs previous visit (${points[points.length - 2].index}% → ${latest.index}%)</span>`));
  }

  // Per-visit rows: date, index + band, delta.
  const tbl = el('div', { style: 'margin-top:8px' });
  points.forEach((p, i) => {
    const isLast = i === points.length - 1;
    const dateStr = p.date ? new Date(p.date).toISOString().slice(0, 10) : '—';
    const tag = (isLast && markLastUnsaved) ? ' <span class="opt-tag">current · unsaved</span>'
      : (p.followup ? ' <span class="opt-tag">follow-up</span>' : ' <span class="opt-tag">baseline</span>');
    const deltaTxt = p.delta ? `<span style="color:${p.delta.color};font-weight:600">${esc(p.delta.label)}</span>` : '<span class="muted">—</span>';
    tbl.appendChild(el('div', { class: 'bar-row', style: 'display:flex;justify-content:space-between;gap:10px;padding:4px 0' },
      `<span>${esc(dateStr)}${tag}</span><span><b>${p.index}%</b> <span class="muted">${esc(p.band)}</span> · ${deltaTxt}</span>`));
  });
  card.appendChild(tbl);

  // Cluster trajectory (first → latest), so symptom shape change is visible.
  if (points.length >= 2) {
    const first = points[0].clusterNorm || {}, last = latest.clusterNorm || {};
    const order = ['Reflux', 'Pain', 'Indigestion', 'Diarrhoea', 'Constipation'];
    const rows = order.filter(k => first[k] != null || last[k] != null).map(k => {
      const f = first[k] == null ? '—' : Math.round(first[k] * 100) + '%';
      const l = last[k] == null ? '—' : Math.round(last[k] * 100) + '%';
      return `<div class="bar-row" style="display:flex;justify-content:space-between;padding:2px 0"><span class="muted">↳ ${esc(k)}</span><span class="muted">${f} → ${l}</span></div>`;
    }).join('');
    if (rows) {
      card.appendChild(el('div', { class: 'q-sub', style: 'margin-top:10px;font-weight:600' }, 'GI clusters (first → latest)'));
      card.appendChild(el('div', {}, rows));
    }
  }

  // Pattern persistence — fired on the latest AND the prior visit.
  if (persistent.length) {
    card.appendChild(el('div', { class: 'q-sub', style: 'margin-top:10px' },
      `Persistent patterns (2+ consecutive visits): <b>${persistent.map(id => esc(id.replace(/_/g, ' '))).join(', ')}</b>`));
  }
  return card;
}

function render() {
  const root = document.getElementById('mode-patient');
  root.innerHTML = '';
  root.appendChild(el('div', { class: 'intro' },
    `<b>Gut &amp; Systemic Health Screen (GSHS).</b> A multi-axis screening instrument for chronic gut and related systemic symptoms. ` +
    `This is a screening aid to support clinical assessment — not a diagnosis.`));

  // How long this takes — the headline count/time is the mandatory questions only.
  // The optional estimate (shown as an "add" figure) covers the optional QUESTIONS
  // (targeted symptom follow-ups) plus ~1 min for the history/lifestyle chip cards,
  // which aren't QUESTIONS; all of it only appears when relevant.
  const minutes = (n) => [Math.max(1, Math.round(n * 8 / 60)), Math.max(1, Math.round(n * 12 / 60))];
  const mainQ = QUESTIONS.filter(q => !q.optional).length;
  const optQ = QUESTIONS.filter(q => q.optional).length;
  const [tLo0, tHi0] = minutes(mainQ);
  const tLo = Math.max(3, tLo0), tHi = Math.max(tLo + 1, tHi0);
  const [oLo, oHi] = minutes(optQ);
  root.appendChild(el('div', { class: 'form-meta' },
    `<span>📋 <b>${mainQ} questions</b> · about <b>${tLo}–${tHi} minutes</b> <span class="muted">(plus optional history, lifestyle &amp; targeted follow-up questions when relevant — <b>about ${oLo + 1}–${oHi + 1} min more</b>)</span></span>
     <span id="progressText" class="muted"></span>`));

  root.appendChild(patientBanner());

  // Clinical intake flow:
  //   Anthropometrics → History → Safety screen → Gut symptoms →
  //   Lifestyle & modifiable drivers → Systemic features → Adaptive deep dive.

  // 1 — Anthropometrics (optional; BMI / WHtR — context, not scored).
  root.appendChild(el('div', { class: 'grp-label', style: 'margin:6px 2px 2px' }, 'Anthropometrics'));
  root.appendChild(anthropometricsCard());

  // 2 — History: diagnosed/suspected conditions, family & birth history,
  // surgical history, current medications.
  root.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'History'));
  root.appendChild(conditionsCard());
  root.appendChild(familyHistoryCard());
  // Obstetric/birth history is shown only for patients recorded as Female (the
  // gender selection in the patient-details form drives this gate).
  if (session.gender === 'Female') root.appendChild(obstetricCard());
  root.appendChild(surgicalCard());
  root.appendChild(medsCard());
  root.appendChild(medConfoundersCard());

  // 3 — Safety screen: alarm / red-flag features (history then informs which matter).
  if (RED_FLAGS.length) {
    root.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'Safety screen'));
    root.appendChild(redFlagCard());
  }

  if (!SECTIONS.length || !QUESTIONS.length) {
    root.appendChild(el('div', { class: 'card' },
      '<div class="empty-note">🌱<br>No domains locked yet.<br>' +
      '<span class="muted">Domains and items appear here as they are co-designed and added to the schema.</span></div>'));
    return;
  }

  // 4 — Gut symptoms: the validated GI core + symptom-characterising cards
  // (stool form, pain & Rome IV — the last two gated on reported pain).
  root.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'Gut symptoms'));
  const giSec = SECTIONS.find(s => s.id === 'GI');
  if (giSec) root.appendChild(sectionCard(giSec));
  root.appendChild(bristolCard());
  // Pain + Rome IV are gated on reported abdominal pain (gsrs_pain ≥ 1) — Rome IV
  // requires recurrent pain, so this spares pain-free patients the burden.
  root.appendChild(wrapHidden('reveal-card-pain', painCard()));
  root.appendChild(wrapHidden('reveal-card-rome', romeCard()));

  // 5 — Lifestyle & modifiable drivers (not part of the Index; feed patterns).
  root.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'Lifestyle & modifiable drivers'));
  root.appendChild(lifestyleCard());
  root.appendChild(sleepCard());
  root.appendChild(dysCard());

  // 6 — Systemic features: the standalone systemic axes (immune/inflammatory,
  // brain-gut & mood, nutrient, functional impact) + the PSS-4 stress scale
  // (which feeds the Psychosocial axis, so it sits with the brain-gut items).
  root.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'Systemic features'));
  SECTIONS.filter(s => ['IM', 'BG', 'NU', 'IMP'].includes(s.id)).forEach(sec => root.appendChild(sectionCard(sec)));
  root.appendChild(pss4Card());

  // 7 — Adaptive deep dive: targeted symptom sections (AR / UG / SY), hidden
  // until the GI core warrants them (revealIf) or the manual toggle is used.
  root.appendChild(targetedSymptomsArea());

  const actions = el('div', { class: 'card row', style: 'justify-content:flex-end' });
  actions.appendChild(el('button', { class: 'btn btn-g', onclick: calc }, 'See results →'));
  root.appendChild(actions);
  root.appendChild(el('div', { id: 'patient-results' }));
  updateIdentityChip();
  updateProgress();
  refreshReveals();
}

// Wrap a node in a hidden, id-tagged holder that refreshReveals() toggles.
function wrapHidden(id, node) {
  const holder = el('div', { id, style: 'display:none' });
  holder.appendChild(node);
  return holder;
}

// One section card (head + items). `femaleOnly` items are shown only when the
// recorded gender is Female. Reused by the main loop and the adaptive area.
function sectionCard(sec) {
  const card = el('div', { class: 'sec-card' });
  const items = questionsOf(sec.id).filter(q => !q.femaleOnly || session.gender === 'Female');
  // Count only items shown up-front (reveal-on-positive follow-ups are hidden until
  // their parent is positive, so they shouldn't inflate the header count).
  const baseCount = items.filter(q => !q.revealIf).length;
  card.appendChild(el('div', { class: 'sec-head', style: `background:${sec.color || '#0F6E56'}` },
    `${esc(sec.full || sec.label)} <span style="opacity:.8;font-weight:500">${baseCount} items</span>`));
  const body = el('div', { class: 'sec-body' });
  if (!sec.noRecall) body.appendChild(el('div', { class: 'q-sub', style: 'padding-top:8px' }, esc(recallNote())));
  items.forEach(q => {
    if (q.revealIf) {
      // reveal-on-positive follow-up item: hidden until refreshReveals() shows it.
      const holder = el('div', { id: 'reveal-item-' + q.id, style: 'display:none' });
      holder.appendChild(questionRow(q));
      body.appendChild(holder);
    } else {
      body.appendChild(questionRow(q));
    }
  });
  card.appendChild(body);
  return card;
}

// Adaptive targeted-symptom area: a manual toggle + one hidden holder per
// conditional section. refreshReveals() decides which holders are visible.
function targetedSymptomsArea() {
  const wrap = el('div', { id: 'targeted-wrap' });
  wrap.appendChild(el('div', { class: 'grp-label', style: 'margin:10px 2px 2px' }, 'Adaptive deep dive (shown when relevant)'));
  const toggle = el('button', { class: 'btn btn-gh', type: 'button', id: 'targetedToggle', style: 'margin:0 0 8px' },
    '+ Show all targeted symptom questions');
  toggle.onclick = () => {
    const on = wrap.dataset.manual === '1';
    wrap.dataset.manual = on ? '' : '1';
    toggle.textContent = on ? '+ Show all targeted symptom questions' : '− Hide targeted symptom questions';
    refreshReveals();
  };
  wrap.appendChild(toggle);
  SECTIONS.filter(s => s.conditional).forEach(sec => {
    const holder = el('div', { id: 'reveal-' + sec.id, style: 'display:none' });
    holder.appendChild(sectionCard(sec));
    wrap.appendChild(holder);
  });
  return wrap;
}

// Card-level reveal gates (the only cards behind revealIf): pain + Rome both need
// recurrent abdominal pain to be worth asking. Keyed by holder id.
const CARD_REVEAL = {
  'reveal-card-pain': { type: 'item', id: 'gsrs_pain', min: 1 },
  'reveal-card-rome': { type: 'item', id: 'gsrs_pain', min: 1 },
};

// ONE reveal pass for sections, cards and items — all off the same revealMet()
// predicate. clusterNorm is computed once here (pure) and shared via ctx. Hidden
// elements keep any answers already given (they still feed scoring/patterns), they
// just don't clutter the form. The manual toggle forces everything visible.
function refreshReveals() {
  const live = computeScores(QUESTIONS.map(q => (answers[q.id] == null ? null : answers[q.id])), { bristol: extras.bristol });
  const ctx = { answers, clusterNorm: live.clusterNorm, flags: { pelvicRisk: obstetricHistory(extras).risk } };
  const wrap = document.getElementById('targeted-wrap');
  const manual = !!(wrap && wrap.dataset.manual === '1');
  // Conditional sections
  SECTIONS.filter(s => s.conditional).forEach(sec => {
    const holder = document.getElementById('reveal-' + sec.id);
    if (holder) holder.style.display = (manual || revealMet(sec.revealIf, ctx)) ? 'block' : 'none';
  });
  // Gated cards (pain / Rome)
  Object.keys(CARD_REVEAL).forEach(id => {
    const h = document.getElementById(id);
    if (h) h.style.display = (manual || revealMet(CARD_REVEAL[id], ctx)) ? '' : 'none';
  });
  // Reveal-on-positive follow-up items
  QUESTIONS.forEach(q => {
    if (!q.revealIf) return;
    const h = document.getElementById('reveal-item-' + q.id);
    if (h) h.style.display = (manual || revealMet(q.revealIf, ctx)) ? '' : 'none';
  });
}

// Live completion progress over the MANDATORY questions only (optional items
// excluded, per design). Drives the header strip + the "answered N of M" text.
function updateProgress() {
  const mandatory = QUESTIONS.filter(q => !q.optional);
  const total = mandatory.length;
  const done = mandatory.filter(q => typeof answers[q.id] === 'number').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('appProgressFill');
  const bar = document.getElementById('appProgress');
  const txt = document.getElementById('progressText');
  if (fill) fill.style.width = pct + '%';
  if (bar) bar.style.display = 'block';
  if (txt) txt.innerHTML = `Answered <b>${done}</b> of <b>${total}</b>`;
}

const PSS4_COLOR = ['s0', 's0', 's1', 's2', 's3']; // map 0–4 anchors to colour classes

// Compact stylised SVG glyph for each Bristol type — a shape cue beside the
// label. Drawn from primitives (NOT the original chart art), so it scales,
// prints, and adds no external assets to the single-file app. Tinted with the
// type's own colour so the icon and tag read as one.
function bristolIcon(n, color, size) {
  const w = size || 34, h = Math.round(w * 0.62), c = color || '#6B4A2E';
  const shapes = {
    1: '<circle cx="7" cy="8" r="3"/><circle cx="17" cy="6" r="3"/><circle cx="27" cy="8" r="3"/><circle cx="12" cy="16" r="3"/><circle cx="23" cy="16" r="3"/>',
    2: '<circle cx="7" cy="11" r="5"/><circle cx="14" cy="11" r="5.5"/><circle cx="21" cy="11" r="5.5"/><circle cx="28" cy="11" r="5"/>',
    3: '<rect x="3" y="7" width="28" height="9" rx="4.5"/><g stroke="#fff" stroke-width="1.1"><line x1="11" y1="7.5" x2="11" y2="15.5"/><line x1="17" y1="7.5" x2="17" y2="15.5"/><line x1="23" y1="7.5" x2="23" y2="15.5"/></g>',
    4: '<rect x="2" y="8" width="30" height="7" rx="3.5"/>',
    5: '<ellipse cx="8" cy="11" rx="5" ry="4"/><ellipse cx="18" cy="11" rx="5" ry="4"/><ellipse cx="27" cy="11" rx="4.5" ry="3.5"/>',
    6: '<circle cx="8" cy="13" r="4"/><circle cx="14" cy="9" r="4"/><circle cx="20" cy="11" r="4.5"/><circle cx="26" cy="13" r="4"/><circle cx="13" cy="15" r="3.5"/><circle cx="22" cy="15" r="3.5"/>',
    7: '<ellipse cx="17" cy="12" rx="14" ry="3.6"/><circle cx="5" cy="18" r="1.3"/><circle cx="17" cy="19" r="1.3"/><circle cx="29" cy="18" r="1.3"/>',
  };
  return `<svg class="bristol-ic" viewBox="0 0 34 22" width="${w}" height="${h}" fill="${c}" aria-hidden="true">${shapes[n] || ''}</svg>`;
}

// Leading icon for a modifiable-driver row: the selected Bristol type uses its
// stool-shape glyph (tinted with the type colour); every other driver keeps its
// emoji. Trailing space so it sits cleanly before the label.
function factorIcon(f) {
  return (f && f.bristolN) ? bristolIcon(f.bristolN, f.color, 20) + ' ' : f.icon + ' ';
}

function bristolCard() {
  const card = el('div', { class: 'sec-card' });

  const grid = el('div', { class: 'bristol-grid' });
  BRISTOL_TYPES.forEach(t => {
    const b = el('button', { class: `bristol-opt${extras.bristol === t.n ? ' sel' : ''}`, type: 'button' },
      `<span class="bristol-n" style="background:${t.col}">${t.n}</span>
       ${bristolIcon(t.n, t.col, 42)}

function pss4Card() {
  const card = el('div', { class: 'sec-card' });
  card.appendChild(el('div', { class: 'sec-head', style: 'background:#5A6EA7' }, 'Stress (PSS-4)'));
  const body = el('div', { class: 'sec-body' });
  body.appendChild(el('div', { class: 'q-sub', style: 'padding-top:8px' }, 'Over the last month. (Shown alongside your result, not part of the score.) Items 2–3 are positively worded — colour reflects the stress level each answer represents, not the wording.'));
  PSS4_ITEMS.forEach((q, qi) => {
    const row = el('div', { class: 'q' });
    row.appendChild(el('div', { class: 'q-txt', style: 'font-weight:500' }, esc(q)));
    const opts = el('div', { class: 'opts', style: 'flex-wrap:nowrap;gap:4px' });
    // Colour by STRESS CONTRIBUTION, not the raw anchor index: positively-framed
    // items (PSS4_REVERSED) are reverse-scored, so a high anchor = LOW stress.
    PSS4_ANCHORS.forEach((lab, v) => {
      const stress = PSS4_REVERSED[qi] ? (PSS4_ANCHORS.length - 1 - v) : v;
      const col = PSS4_COLOR[stress] || 's1';
      const b = el('button', { class: `opt${extras.pss4[qi] === v ? ` sel ${col}` : ''}`, type: 'button', style: 'min-width:0;flex:1;font-size:11px;padding:6px 4px' },
        `<span class="on">${v}</span>${esc(lab)}`);
      b.onclick = () => { extras.pss4[qi] = v; opts.querySelectorAll('.opt').forEach(o => o.classList.remove('sel', ...PSS4_COLOR)); b.classList.add('sel', col); };
      opts.appendChild(b);
    });
    row.appendChild(opts); body.appendChild(row);
  });
  card.appendChild(body);
  return card;
}

function painCard() {
  const card = el('div', { class: 'sec-card' });
  card.appendChild(el('div', { class: 'sec-head', style: 'background:#8B3A1A' }, 'Pain (optional)'));
  const body = el('div', { class: 'sec-body' });

  const nrs = el('div', { class: 'nrs-row' });
  const regWrap = el('div', { style: 'margin-top:10px' });
  for (let v = 0; v <= 10; v++) {

    };

// Recent gut disruptors — multi-select toggles. Strong modifiable microbiome
// influences (and they explain regressions between visits). Not part of the score.
function medsCard() {
  const card = el('div', { class: 'sec-card' });

  const body = el('div', { class: 'sec-body' });
  body.appendChild(el('div', { class: 'q-sub', style: 'padding-top:8px' }, 'Tap any you have taken recently. Not part of the score.'));
  const chips = el('div', { class: 'chips' });
  DISRUPTORS.forEach(d => {
    const b = el('button', { class: `chip-opt${extras.meds[d.id] ? ' sel' : ''}`, type: 'button' }, esc(d.label));
    b.onclick = () => { extras.meds[d.id] = !extras.meds[d.id]; b.classList.toggle('sel'); };
    chips.appendChild(b);
  });
  body.appendChild(chips);
  // §7c — other medications free-text (e.g. opioids, metformin). Stored, not scored.

// Pure computation — no DOM. Used by calc() and printSummary() so print can
// regenerate results without re-running the render pipeline.
function computeAll() {
  const answerArr = QUESTIONS.map(q => (answers[q.id] == null ? null : answers[q.id]));
  const score = computeScores(answerArr, { bristol: extras.bristol });
  const sv = score.severity;
  const conf = scoreConfidence(score);
  const ps = pss4Score(extras.pss4);
  const driverExtras = {
    pss4Score: ps, nrsPain: extras.nrsPain, bristol: extras.bristol,
    bgAnxiety: answers.bg_anxiety, bgMood: answers.bg_mood,
    meds: extras.meds, dietFibre: extras.dietFibre, dietProcessed: extras.dietProcessed,
    alcohol: extras.alcohol, activity: extras.activity,
    sleep: extras.sleep,                                  // sleep driver — feeds the modifiable-factors card
    surgeries: extras.surgeries, surgeryOther: extras.surgeryOther,
    abxCourses: extras.abxCourses, dys: extras.dys,
    rome: extras.rome,
    medsOther: extras.medsOther,
    conditions: extras.conditions,
  };
  const patterns = detectPatterns(score, driverExtras, answers);
  const fired = firedRedFlags(redflags);
  const lens = dysbiosisLens(extras);
  const rome = classifyRomeIV(extras.rome, score.clusterNorm);
  const profile = axisProfile(score, driverExtras, lens);
  const heads = headlineOutputs(score, driverExtras, lens);
  const conditions = knownConditions(extras);
  const meds = medConfounders(extras);
  const famhx = familyHistory(extras);
  const obstetric = obstetricHistory(extras);
  const anthro = anthropometrics(extras, session);
  const autonomicFlag = (typeof answers.sy_orthostatic === 'number' && answers.sy_orthostatic >= 2)
    || (typeof answers.sy_palpitations === 'number' && answers.sy_palpitations >= 2);
  // Gynaecological / endometriosis overlap: cyclical flare (≥ moderate) with
  // abdominal pain present. gy_cyclical is already female-gated in the schema.
  const gynOverlap = (typeof answers.gy_cyclical === 'number' && answers.gy_cyclical >= 2)
    && (typeof answers.gsrs_pain === 'number' && answers.gsrs_pain >= 2);
  // The Dysbiosis Correlate Load (inferred signals only) — the count triage and
  // the Symptom×Microbiome matrix should read, NOT the old merged lens (which
  // also folded in objective exposure history like antibiotics / surgery).
  const correlateLoad = {
    count: heads.primary.correlate.value,
    signals: (heads.primary.correlate.signals || []).map(label => ({ label })),
  };
  const tri = triage(score, patterns, fired, correlateLoad, {
    adhesionSurgery: surgicalFlags(extras).adhesion,
    romeResult: rome,
    impactBand: profile.impact.band,
    knownConditions: conditions,
    conditionNotes: conditions.notes,
    medConfounders: meds.list,
    autonomicFlag,
    family: famhx,
    gynOverlap,
    obstetric,
    anthro,
  });
  return { score, sv, conf, driverExtras, patterns, fired, lens, rome, tri, profile, heads, conditions, correlateLoad, meds, famhx, obstetric, anthro };
}

// withClusters=true adds the GSRS symptom-shape sub-bars + Bristol-transit note
// (clinician view); the patient view keeps it simple (domain bars only).
function domainBarsCard(score, withClusters) {
  const card = el('div', { class: 'card' });
  card.appendChild(el('h2', {}, 'Domain'));
  card.appendChild(el('div', { class: 'q-sub', style: 'margin-bottom:6px' }, 'How much each area contributes (higher = more symptoms).'));
  SECTIONS.forEach(s => {
    const sc = score.secScores[s.id] || 0;
    const max = score.secApplicableMax[s.id] || 0; // applicable max (excludes N/A items)
    if (!max) return; // skip sections with nothing answered (e.g. un-revealed targeted sections)
    const p = Math.round(sc / max * 100);
    const detail = withClusters ? `${sc}/${max} · ${p}%` : p + '%';
    card.appendChild(el('div', { class: 'bar-row' },
      `<div class="bar-label"><span>${esc(s.full || s.label)}</span><span class="muted">${detail}</span></div>
       <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${s.color || '#0F6E56'}"></div></div>`));
    if (!withClusters || s.id !== 'GI') return;
    // Bristol transit transparency + GSRS per-cluster symptom shape (clinician view).
    if (score.bristolSignal != null && score.secNorm.GI != null) {
      const addPts = Math.round((score.secNorm.GI - (max ? sc / max : 0)) * 100);
      const bt = BRISTOL_TYPES.find(t => t.n === extras.bristol);
      card.appendChild(el('div', { class: 'q-sub', style: 'margin:-4px 0 12px;padding-left:2px;color:var(--inks)' },
        `↳ Stool transit ${addPts > 0 ? `adds +${addPts} pts to` : 'adds nothing to'} gut-core${bt ? ` · Type ${bt.n} (${esc(bt.tag)})` : ''} — capped so it can't dominate.`));
    }
    if (score.clusterAgg) {
      ['Reflux', 'Pain', 'Indigestion', 'Diarrhoea', 'Constipation'].forEach(k => {
        const c = score.clusterAgg[k]; if (!c || c.max === 0) return;
        const cp = Math.round(c.sum / c.max * 100);
        card.appendChild(el('div', { class: 'bar-row', style: 'padding-left:18px' },
          `<div class="bar-label"><span class="muted">↳ ${esc(k)}</span><span class="muted">${c.sum}/${c.max} · ${cp}%</span></div>
           <div class="bar-track" style="height:6px"><div class="bar-fill" style="width:${cp}%;background:${s.color};opacity:.6"></div></div>`));
      });
    }
  });
  return card;
}

function calc() {
  const c = computeAll();
  lastCalc = c;
  const { score, sv, conf, driverExtras, patterns, fired, lens, rome, tri, profile, heads, conditions, correlateLoad } = c;

  const out = document.getElementById('patient-results');
  out.innerHTML = '';

  const isPregnant = session.pregnant === 'yes';
  const ageNum = parseInt(session.age, 10);
  const isMinor = !isNaN(ageNum) && ageNum < 18;
  if (isPregnant || isMinor) {
    const note = isPregnant && isMinor
      ? 'Patient is pregnant and under 18.'
      : isPregnant ? 'Patient is pregnant.' : 'Patient is under 18.';
    out.appendChild(el('div', { class: 'rf-banner', style: 'background:#FFF3CD;border-color:#FECB1F;color:#7B5900' },
      `<div class="rf-ic" style="font-size:20px">ℹ️</div><div><div class="rf-title" style="color:#7B5900">Applicability note</div>
       <div class="rf-body">${esc(note)} This screen was developed in a general adult population. Results and triage guidance should be interpreted with that context in mind — discuss with a clinician before acting.</div></div>`));
  }

  if (anyRedFlag(redflags)) {
    const items = fired.map(f => `<li>${esc(f.label)}</li>`).join('');
    out.appendChild(el('div', { class: 'rf-banner' },
      `<div class="rf-ic">⚠️</div><div><div class="rf-title">Please speak with a clinician about these answers</div>
       <div class="rf-body">${esc(RED_FLAG_BANNER)}</div><ul class="rf-list">${items}</ul></div>`));
  }

  if (score.completeness < 80) toast(`${score.completeness}% complete — result shown as provisional.`);

  // Patient-facing results only. The clinical summary (item-level detail,
  // investigations) lives in the Clinician tab — no inline toggle here, so
  // clinical content no longer spills under the questionnaire.
  out.appendChild(el('div', { class: 'q-sub', style: 'text-align:right;margin-bottom:6px' },
    'For the full clinical summary, open the <b>Clinician</b> tab.'));

  // GSHS headline — the four PRIMARY outputs (Option A).
  out.appendChild(headlineCard(heads, rome));

  // Gut Symptom Burden detail — descriptor + completeness/confidence.
  const hero = el('div', { class: 'card' });
  hero.appendChild(el('div', { class: 'hero' },
    `<div><div class="big">${sv.index == null ? '—' : sv.index + '%'}</div><div class="sub">Gut Symptom Burden</div></div>
     <div style="flex:1;min-width:160px">${sv.label ? `<span class="pill ${sv.cls || bandPillClass(sv.label)}">${esc(sv.label)}</span>` : ''}
     <div style="font-size:12px;color:var(--inks);margin-top:8px;line-height:1.5">${esc(sv.desc || '')}</div>
     <div class="conf-note">Confidence: <b>${esc(conf.level)}</b> · ${score.completeness}% complete</div></div>`));
  if (score.completeness < 80) hero.appendChild(el('div', { class: 'prov-caveat' },
    `Provisional result — ${score.completeness}% of scored items answered.`));
  out.appendChild(hero);

  // Score-then-story order: the cards below are BUILT here but appended in a
  // single ordered block lower down (headline → symptom detail → by-domain →
  // secondary axes → patterns → symptom×microbiome → next step → drivers → trend).

  // Live trend preview: if this patient reference has prior visits, show the
  // trajectory. For a freshly-completed questionnaire the current visit is
  // appended as 'unsaved'; for a loaded saved visit it's already in the DB so
  // we don't duplicate it — just show all saved visits (needs ≥2 to be useful).
  const prior = priorVisits();
  let trendEl = null;
  if (loadedVisitId) {
    if (prior.length >= 2) trendEl = trendCard(prior, false);
  } else {
    if (prior.length >= 1) trendEl = trendCard(prior.concat([currentVisit()]), true);
  }

  const bars = domainBarsCard(score, false);

  // Modifiable drivers — context, not part of the Index (computed above with the
  // triage inputs; rendered here).
  const driv = el('div', { class: 'card' });
  driv.appendChild(el('h2', {}, 'Modifiable drivers'));
  driv.appendChild(el('div', { class: 'q-sub' }, 'Shown for context — not added to the GI Symptom Burden score. These feed the pattern & triage guidance.'));
  const dg = el('div', { class: 'drivers' });
  modifiableFactors(driverExtras).forEach(f => dg.appendChild(el('div', { class: 'driver' },
    `<div class="dl" style="font-weight:600;margin-bottom:2px">${factorIcon(f)}${esc(f.label)}</div>
     <div class="dv" style="color:${f.color}">${esc(f.band)}</div>
     ${f.score ? `<div class="dl">${esc(f.score)}</div>` : ''}`)));
  driv.appendChild(dg);

  // Patterns — first-cut clinical-discussion patterns from drivers + clusters
  // (computed above with the triage inputs). Conservatively framed; confidence
  // reflects how much supporting data was answered.
  let patternsEl = null;
  if (patterns.length > 0) {
    const pcard = el('div', { class: 'card' });
    pcard.appendChild(el('h2', {}, 'Patterns to discuss with your clinician'));
    pcard.appendChild(el('div', { class: 'q-sub' }, 'First-cut patterns from your answers and drivers. These are not diagnoses — they are starting points for a conversation with your clinician.'));
    patterns.forEach(p => {
      pcard.appendChild(el('div', { class: 'pat', style: 'padding:12px 14px;border:1px solid #E1E5EB;border-radius:8px;margin-top:10px;background:#F9FAFB' },
        `<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
           <div style="font-weight:600">${esc(p.label)}</div>
           <span style="font-size:11px;padding:2px 8px;border-radius:999px;background:${p.confColor};color:#fff">${esc(p.confidence)} confidence</span>
         </div>
         <div class="q-sub" style="margin-top:6px;color:var(--inks);line-height:1.5">${esc(p.desc)}</div>`));
    });
    patternsEl = pcard;
  }

  // ── Ordered render (score-then-story) ──────────────────────────────────────
  out.appendChild(axisProfileCard(profile, heads));   // secondary axes
  out.appendChild(bars);                              // by-domain breakdown (between secondary axes and drivers)
  out.appendChild(driv);                              // modifiable drivers
  if (patternsEl) out.appendChild(patternsEl);        // patterns to discuss
  out.appendChild(riskMatrixCard(sv, correlateLoad)); // symptom × dysbiosis-correlate
  out.appendChild(triageCard(tri, rome, false));      // suggested next step
  if (trendEl) out.appendChild(trendEl);              // progress over time

  // Clinician detail (item-level responses, Rome IV raw, investigations) lives in
  // the Clinician tab — intentionally not rendered in the patient results.

  // Save-a-visit + pilot-CSV download + print.
  const actions = el('div', { class: 'card row', style: 'justify-content:flex-end;gap:8px;flex-wrap:wrap' });
  const saveBtn = el('button', { class: 'btn btn-g', type: 'button' }, loadedVisitId ? 'Update this response' : 'Save this response');
  saveBtn.onclick = () => {
    try {
      const r = saveVisit();
      saveBtn.disabled = true; saveBtn.textContent = r.isUpdate ? 'Updated ✓' : 'Saved ✓';
      if (r.isUpdate) {
        toast(r.linked
          ? `Visit updated for ${(session.ref || session.name || '').trim()}.`
          : 'Visit updated.');
      } else {
        toast(r.linked
          ? `Saved as visit ${r.visits.length} for ${(session.ref || '').trim()}.`
          : 'Response saved (standalone — add a patient reference to track progress).');
      }
      // Re-point the trend card at the now-persisted series (drops the "unsaved" tag).
      const existing = out.querySelector('#trend-card');
      if (r.visits.length >= 2) { const fresh = trendCard(r.visits, false); existing ? existing.replaceWith(fresh) : out.appendChild(fresh); }
    } catch (e) { toast('Could not save: ' + (e && e.message || 'storage error')); }
  };
  actions.appendChild(saveBtn);
  const dlBtn = el('button', { class: 'btn', type: 'button' }, 'Download pilot CSV');
  dlBtn.onclick = () => {
    const csv = Store.pilotExportCSV(Store.loadDB());
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `gut-screen-pilot-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  };
  actions.appendChild(dlBtn);
  const ptPrintBtn = el('button', { class: 'btn btn-gh', type: 'button' }, '🖨 Patient summary');
  ptPrintBtn.onclick = () => printSummary('patient');
  actions.appendChild(ptPrintBtn);
  const clPrintBtn = el('button', { class: 'btn btn-gh', type: 'button' }, '🖨 Clinician report');
  clPrintBtn.onclick = () => printSummary('clinician');
  actions.appendChild(clPrintBtn);
  const newBtn = el('button', { class: 'btn', type: 'button' }, 'Start new');
  newBtn.onclick = () => { clearPatient(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  actions.appendChild(newBtn);
  out.appendChild(actions);

  out.scrollIntoView?.({ behavior: 'smooth', block: 'start' });
}

// Suggested-next-step (triage) card. showInvestigations adds the pattern-matched
// investigation/management list (clinician-facing). Shared by calc() and the
// clinician tab so both render an identical plan block.
function triageCard(tri, rome, showInvestigations) {
  const tcard = el('div', { class: 'card', style: `border-left:6px solid ${tri.color}` });
  tcard.appendChild(el('h2', {}, 'Suggested next step'));
  tcard.appendChild(el('div', { class: 'row', style: 'align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px' },
    `<span class="pill" style="background:${tri.color};color:#fff">Tier ${tri.level} · ${esc(tri.label)}</span>`));
  tcard.appendChild(el('div', { style: 'font-size:13px;color:var(--inks);line-height:1.5;margin-top:6px' }, esc(tri.action)));
  if (tri.reasons.length) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:8px' },
    'Why: ' + tri.reasons.map(r => esc(r.text)).join(' · ')));
  if (tri.conditionNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    'ℹ️ ' + esc(tri.conditionNote)));
  if (tri.medNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '💊 ' + esc(tri.medNote)));
  if (tri.autonomicNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '🫀 ' + esc(tri.autonomicNote)));
  (tri.conditionGuidance || []).forEach(n => tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    'ℹ️ ' + esc(n))));
  (tri.familyNotes || []).forEach(n => tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '🧬 ' + esc(n))));
  if (tri.gynNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '⚕️ ' + esc(tri.gynNote)));
  if (tri.pelvicNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '🧷 ' + esc(tri.pelvicNote)));
  if (tri.anthroNote) tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:6px;color:#7A3410' },
    '📏 ' + esc(tri.anthroNote)));
  if (tri.alsoConsider.length) {
    tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:8px;font-weight:600' }, 'Also worth noting:'));
    tri.alsoConsider.forEach(a => tcard.appendChild(el('div', { class: 'q-sub', style: 'padding-left:4px' },
      `• ${esc(a.label)} — ${a.reasons.map(r => esc(r.text)).join('; ')}`)));
  }
  if (rome && rome.criteriaMet) {
    tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:8px;font-weight:600;color:#185FA5' },
      `Meets Rome IV-informed criteria for ${esc(rome.subtype)} — single-visit estimate, not the prospective diary Rome IV was validated against. A pattern to discuss, not a diagnosis.`));
  }
  if (showInvestigations && tri.investigations && tri.investigations.length) {
    tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:10px;font-weight:600;color:#3A4A5A' }, 'Suggested investigations / management:'));
    tcard.appendChild(el('ul', { class: 'rf-list', style: 'color:#3A4A5A;margin-top:2px' },
      tri.investigations.map(i => `<li>${esc(i)}</li>`).join('')));
    tcard.appendChild(el('div', { class: 'q-sub', style: 'color:#888;font-style:italic;margin-top:3px' }, 'Pattern-matched — apply clinical judgement. Not a protocol.'));
  }
  tcard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:10px;font-style:italic;color:#999' },
    'Clinical guidance for discussion — not a diagnosis or prescription.'));
  return tcard;
}

// Clinician detail card: item-level responses, Rome IV criteria answers,
// pattern confidence + rationale, driver raw values, and red flag detail.
function clinicianDetailCard(c) {
  const { score, conf, driverExtras, patterns, fired, lens, rome, tri } = c;
  const card = el('div', { class: 'clin-detail' });
  card.appendChild(el('h2', { style: 'margin-bottom:10px' }, 'Clinical detail <span class="clin-badge">Clinician view</span>'));

  function chead(txt) { return el('div', { class: 'clin-h' }, txt); }
  function tbl(thead, rows) {
    const t = el('table', { class: 'clin-tbl' });
    t.innerHTML = `<thead><tr>${thead.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody>`;
    return t;
  }

  // Confidence & completeness
  card.appendChild(chead('Score confidence'));
  const secWithData = score.secAnswered
    ? Object.values(score.secAnswered).filter(s => s.answered > 0).length + ' / ' + Object.keys(score.secAnswered).length
    : '—';
  card.appendChild(tbl(['Metric', 'Value'], `
    <tr><td>Overall completeness</td><td>${score.completeness}%</td></tr>
    <tr><td>Sections with data</td><td>${esc(String(secWithData))}</td></tr>
    <tr><td>Confidence level</td><td>${esc(conf.level)}</td></tr>
    <tr><td>GI core answered</td><td>${score.coreUnknown ? '<b style="color:#A32D2D">No — result provisional</b>' : 'Yes'}</td></tr>`));

  // Item-level responses per scored section
  card.appendChild(chead('Item-level responses'));
  SECTIONS.forEach(sec => {
    const qs = questionsOf(sec.id);
    if (!qs.length) return;
    const sc = score.secScores[sec.id] || 0;
    const mx = score.secApplicableMax[sec.id] || 0;
    const pct = mx ? Math.round(sc / mx * 100) : 0;
    card.appendChild(el('div', { style: 'font-size:11px;font-weight:600;color:#3A4A5A;margin:8px 0 3px;padding:2px 0;border-bottom:1px solid #D8DDE3' },
      `${esc(sec.full || sec.label)} — ${sc}/${mx} (${pct}%)`));
    const rows = qs.map(q => {
      const val = answers[q.id];
      const labels = scaleFor(q.scale);
      const disp = q.freeText
        ? (typeof val === 'string' && val.trim() ? esc(val) : '<span style="color:#999">—</span>')
        : val === 'na' ? '<i>N/A</i>' : val == null ? '<span style="color:#999">—</span>' : `${val} — ${esc(labels[val] || '')}`;
      return `<tr><td>${esc(q.patientText)}</td><td>${disp}</td></tr>`;
    }).join('');
    card.appendChild(tbl(['Question', 'Answer'], rows));
  });

  // Rome IV criteria detail
  card.appendChild(chead('Rome IV-informed criteria'));
  const { ROME_FREQ, ROME_ONSET, ROME_ASSOC } = __req('romeiv.js');
  const r = extras.rome || {};
  const rRows = [
    ['Pain frequency', r.painFreq != null ? `${r.painFreq} — ${esc(ROME_FREQ[r.painFreq] || '')}` : '—'],
    ['Onset', r.onset != null ? `${r.onset} — ${esc(ROME_ONSET[r.onset] || '')}` : '—'],
    ...ROME_ASSOC.map(a => [esc(a.label), r[a.id] ? '<b>Yes</b>' : 'No']),
    ['Result', rome.criteriaMet
      ? `<b style="color:#185FA5">Criteria met — ${esc(rome.subtype || '')}</b>`
      : rome.answered ? 'Criteria not met' : '<span style="color:#999">Not answered</span>'],
  ].map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  card.appendChild(tbl(['Item', 'Response'], rRows));

  // Microbiome correlate signals
  if (lens.signals && lens.signals.length) {
    card.appendChild(chead(`Microbiome-correlate signals (${lens.count}/6)`));
    card.appendChild(el('ul', { style: 'font-size:11.5px;padding-left:18px;margin:2px 0' },
      lens.signals.map(s => `<li>${esc(s.label)}</li>`).join('')));
  }

  // Pattern detail
  if (patterns.length) {
    card.appendChild(chead('Pattern analysis'));
    const ptRows = patterns.map(p =>
      `<tr><td><b>${esc(p.label)}</b></td>
       <td><span style="background:${p.confColor};color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;white-space:nowrap">${esc(p.confidence)}</span></td>
       <td>${esc(p.desc)}</td></tr>`
    ).join('');
    card.appendChild(tbl(['Pattern', 'Confidence', 'Rationale'], ptRows));
  }

  // Modifiable driver raw values
  card.appendChild(chead('Modifiable driver raw values'));
  const drRows = modifiableFactors(driverExtras).map(f =>
    `<tr><td>${factorIcon(f)}${esc(f.label)}</td><td style="color:${f.color}">${esc(f.band)}</td><td style="color:var(--inkt)">${esc(f.score || '')}</td></tr>`
  ).join('');
  card.appendChild(tbl(['Factor', 'Band', 'Score'], drRows));

  // Red flags are shown in a foregrounded card under triage (renderClinician) —
  // not duplicated here.

  return card;
}

// Populate #print-area and call window.print(). Requires lastCalc to be set.
function printSummary(mode) {
  if (!lastCalc) { toast('Run the questionnaire first to generate a summary.'); return; }
  const area = document.getElementById('print-area');
  if (!area) return;
  area.innerHTML = '';
  area.appendChild(mode === 'clinician' ? buildClinicianPrint(lastCalc) : buildPatientPrint(lastCalc));
  window.print();
}
