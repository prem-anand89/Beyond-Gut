  if (isPregnant || isMinor) {
    const note = isPregnant && isMinor ? 'Pregnant and under 18' : isPregnant ? 'Pregnant' : 'Under 18';
    h += `<div class="pr-info"><b>ℹ️ Note:</b> ${esc(note)}. This screen was developed in a general adult population — discuss results with your clinician before acting.</div>`;
  }
  if (fired.length) {
    h += `<div class="pr-alert"><div class="pr-alert-t">⚠ Please speak with a clinician about the following</div>
      <ul style="margin:4px 0 0 14px;font-size:10.5px">${fired.map(f => `<li>${esc(f.label)}</li>`).join('')}</ul></div>`;
  }

  // ── Section 0 — Clinical impression (auto-synthesis) ───────────────────────
  const imp = clinicalImpression(c);
  h += `<div class="pr-section"><div class="pr-sh">Clinical impression</div>
    <div style="font-size:11px;line-height:1.5">${esc(imp.txt)}</div>
    <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:3px">${esc(imp.caveat)}</div></div>`;

  // ── Section 1 — Your results at a glance (4 primary outputs) ─────────────────
  h += `<div class="pr-section"><div class="pr-sh">Your results at a glance</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">`;
  heads.primaryList.forEach(o => {
    const isCount = COUNT_LOADS.has(o.key);
    const val = o.value == null ? '—' : (isCount ? `${o.value} signal${o.value === 1 ? '' : 's'}` : o.value + '%');
    const valTag = o.validated === true ? 'validated questionnaire' : 'screening estimate';
    h += `<div style="border:1px solid #D9E0E6;border-radius:8px;padding:9px 10px;background:#fff">
      <div style="font-size:11px;font-weight:700;color:#2A3A4A">${esc(o.label)}</div>
      <div style="margin:4px 0"><span style="font-size:15px;font-weight:700">${esc(String(val))}</span>
        ${o.band ? ` <span class="pr-pill" style="background:${ptBandBg(o.band)};color:#000;font-size:9.5px">${esc(o.band)}</span>` : ''}</div>
      <div style="font-size:9.5px;color:#555;line-height:1.4">${esc(PT_HEAD_DESC[o.key] || '')}</div>
      <div style="font-size:8.5px;color:#999;margin-top:3px;font-style:italic">(${valTag})</div>
    </div>`;
  });
  h += `</div>`;
  // Secondary axes — band-only pills, only those that were answered.
  const secPills = heads.secondaryList.filter(o => o.band).map(o =>
    `<span class="pr-pill" style="background:${ptBandBg(o.band)};color:#000;font-size:9.5px;margin:2px 4px 2px 0">${esc(o.label)} — ${esc(o.band)}</span>`).join('');
  if (secPills) {
    h += `<div style="margin-top:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-size:9.5px;color:#777;margin-bottom:3px">Other systemic reads (screening estimates):</div>${secPills}</div>`;
  }
  h += `</div>`;

  // ── Section 2 — What this means for you (triage + plain notes) ───────────────
  const tierCls = ['', 't1', 't2', 't3', 't4'][tri.level] || 't4';
  const ptNotes = [].concat(
    tri.conditionGuidance || [], tri.familyNotes || [],
    tri.conditionNote ? [tri.conditionNote] : [], tri.labNote ? [tri.labNote] : [],
    tri.autonomicNote ? [tri.autonomicNote] : [],
    tri.gynNote ? [tri.gynNote] : [], tri.pelvicNote ? [tri.pelvicNote] : [],
    tri.anthroNote ? [tri.anthroNote] : [], tri.medNote ? [tri.medNote] : [],
    tri.durationNote ? [tri.durationNote] : [], tri.bowelFreqNote ? [tri.bowelFreqNote] : [],
    tri.smokingNote ? [tri.smokingNote] : [], tri.treatmentsTriedNote ? [tri.treatmentsTriedNote] : [],
    tri.coeliacTimingNote ? [tri.coeliacTimingNote] : [], tri.restrictionNote ? [tri.restrictionNote] : [],
    tri.referredPainNote ? [tri.referredPainNote] : [], tri.restrictionScreenNote ? [tri.restrictionScreenNote] : []);
  h += `<div class="pr-section"><div class="pr-sh">What this means for you</div>
    <div class="pr-triage ${tierCls}">
      <div style="font-weight:700;font-size:12px">Suggested next step: Tier ${tri.level} — ${esc(tri.label)}</div>
      <div style="font-size:11px;margin-top:4px">${esc(tri.action)}</div>
      ${tri.reasons.length ? `<div style="font-size:10.5px;color:#555;margin-top:4px">Why: ${tri.reasons.map(r => esc(r.text)).join(' · ')}</div>` : ''}
      ${ptNotes.length ? `<ul style="margin:6px 0 0 14px;font-size:10.5px;line-height:1.5">${ptNotes.map(n => `<li>ℹ️ ${esc(n)}</li>`).join('')}</ul>` : ''}
    </div>
    <div style="font-size:9.5px;color:#888;margin-top:4px">Confidence: ${esc(conf.level)} · ${score.completeness}% complete</div></div>`;

  // ── Section 3 — Bowel pattern (only if Rome IV-informed criteria met) ────────
  if (rome && rome.criteriaMet && rome.subtype) {
    h += `<div class="pr-section"><div class="pr-sh">Bowel pattern</div>
      <div style="font-size:11px"><b>${esc(rome.subtype)}</b> — ${esc(PT_SUBTYPE_DESC[rome.subtype] || '')}.</div>
      <div style="font-size:9.5px;color:#888;margin-top:3px;font-style:italic">Based on your responses on the day — a pattern to discuss, not a formal diagnosis.</div></div>`;
  }

  // ── Section 4 — Patterns noted (only if any fired) ──────────────────────────
  if (patterns.length) {
    h += `<div class="pr-section"><div class="pr-sh">Patterns noted</div>
      <div style="font-size:10px;color:#555;margin-bottom:4px">Your responses suggest these may be relevant. Your clinician will review them with you.</div>
      <ul style="margin:0 0 0 14px;font-size:10.5px;line-height:1.5">${patterns.map(p => `<li><b>${esc(p.label)}</b>${p.desc ? ` — ${esc(p.desc)}` : ''}</li>`).join('')}</ul></div>`;
  }

  // ── Section 5 — Symptom breakdown (per-area bars) ───────────────────────────
  h += `<div class="pr-section"><div class="pr-sh">Symptom breakdown</div>
    <div style="font-size:9.5px;color:#777;margin-bottom:5px">How your symptoms spread across areas. The gut symptom bars come from a validated questionnaire; the rest are screening estimates.</div>`;
  SECTIONS.forEach(s => {
    const sc = score.secScores[s.id] || 0, mx = score.secApplicableMax[s.id] || 0;
    if (!mx) return;
    // GI bar matches the headline Index (cluster-balanced), not a raw item mean.
    const giNorm = s.id === 'GI' ? score.secNorm.GI : null;
    const p = giNorm != null ? Math.round(giNorm * 100) : Math.round(sc / mx * 100);
    h += `<div class="pr-bar-row"><span style="width:150px;flex:none;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.full || s.label)}</span>

      <span style="width:34px;flex:none;text-align:right">${p}%</span></div>`;
  });
  h += `</div>`;

  // ── Section 6 — Body measurements (only if entered) ─────────────────────────
  if (anthro && (anthro.bmi != null || anthro.whtr != null)) {
    const bmiTxt = anthro.bmi != null ? `BMI ${anthro.bmi}${anthro.bmiBand ? ` (${anthro.bmiBand})` : ''}` : null;
    const whtrTxt = anthro.whtr != null ? `Waist-to-height ratio ${anthro.whtr}${anthro.whtrBand ? ` (${anthro.whtrBand})` : ''}` : null;
    h += `<div class="pr-section"><div class="pr-sh">Body measurements</div>
      <div style="font-size:10.5px">${esc([bmiTxt, whtrTxt].filter(Boolean).join(' · '))}${anthro.caveat ? `<br><i style="color:#777">${esc(anthro.caveat)}</i>` : ''}</div></div>`;
  }

  // ── Section 7 — Modifiable factors ──────────────────────────────────────────
  const mf = modifiableFactors(driverExtras).filter(f => f.band && f.band !== 'Not answered');
  if (mf.length) {
    // Band shown as a colour swatch + dark, bold text so it stays legible in
    // print (coloured text alone was low-contrast for the lighter bands).
    h += `<div class="pr-section"><div class="pr-sh">Modifiable factors</div>
      <table class="pr-tbl"><tbody>${mf.map(f => `<tr><td style="color:#000">${factorIcon(f)}${esc(f.label)}</td><td style="color:#000"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${f.color};margin-right:6px;vertical-align:middle"></span><b>${esc(f.band)}</b>${f.score ? ` <span style="color:#555">· ${esc(f.score)}</span>` : ''}</td></tr>`).join('')}</tbody></table></div>`;
  }

  h += `<div class="pr-footer">This is a screening tool — it is not a diagnosis. Please discuss your results with your clinician. For the full clinical detail, ask for the clinician summary.<br>Enterro360 · Gut & Systemic Health Screen · ${esc(dateStr)}</div>`;
  div.innerHTML = h;
  return div;
}

// Print band pill (clinician) — colour-coded so the eye lands on the high axes.
function prBandPill(band) {
  if (!band) return '';
  return `<span class="pr-pill" style="background:${ptBandBg(band)};color:#000;font-size:9.5px">${esc(band)}</span>`;
}
// Print provenance tag — validated / part-validated / draft, mirroring provTag().
function prProv(validated) {
  const m = validated === true ? ['validated', '#0F6E56']
    : validated === 'derived' ? ['derived', '#2C5D8A']
    : validated === 'partial' ? ['part. validated', '#7A5800'] : ['draft', '#6B7280'];
  return `<span style="font-size:9px;color:${m[1]}">${m[0]}</span>`;
}

// Bands that warrant clinical attention, shared by the impression + physio callout.
const CONCERN_BANDS = new Set(['Significant', 'Severe', 'Elevated']);

// One- to two-sentence auto-synthesis for the top of the clinician report. Strictly
// a restatement of computed findings — no inference beyond what each axis/pattern
// already says — and always closed with an explicit "screening, not diagnosis"
// caveat so it can never read as a clinical conclusion.
function clinicalImpression(c) {
  const { score, sv, conf, fired, rome, tri, heads, correlateLoad, patterns } = c;
  const bits = [];
  if (sv && sv.label) {
    // E4 — reflect a peak-escalated band in the readable layer so the plain-
    // language summary matches the escalated display, not the raw number alone.
    const peakNote = (sv.peakEscalated) ? ' (raised for an isolated high-severity symptom)' : '';
    bits.push(`${sv.label.toLowerCase()} gut-symptom burden${score.index != null ? ` (index ${score.index}%)` : ''}${peakNote}`);
  }
  if (rome && rome.criteriaMet && rome.subtype) bits.push(`pattern consistent with ${rome.subtype}`);
  // F2 — call out the paradoxical pelvic-floor read explicitly (management differs).
  if (patterns && patterns.some(p => p.id === 'pelvic_floor_paradox')) bits.push('paradoxical pelvic-floor (dyssynergic) features');
  // E3 — weighted Dys-R tier when Moderate/High.
  if (correlateLoad && (correlateLoad.tier === 'High' || correlateLoad.tier === 'Moderate')) bits.push(`${correlateLoad.tier.toLowerCase()} dysbiosis-correlate load`);
  const elevated = [];
  if (heads) {
    const nut = heads.primary && heads.primary.nutrient;
    if (nut && CONCERN_BANDS.has(nut.band)) elevated.push('possible malabsorption');
    (heads.secondaryList || []).forEach(o => { if (CONCERN_BANDS.has(o.band)) elevated.push(o.label.toLowerCase()); });
  }
  if (elevated.length) bits.push(`elevated systemic reads (${elevated.join(', ')})`);
  let txt = bits.length ? `${bits.join('; ')}.` : 'No prominent findings on this screen.';
  txt = txt.charAt(0).toUpperCase() + txt.slice(1);
  // E4 — surface an isolated peak symptom even when the averaged burden is modest.
  if (score.peakAlerts && score.peakAlerts.length) txt += ` ⚠ Peak-symptom alert: ${score.peakAlerts.map(p => `${p.label} (${p.level === 'ceiling' ? 'very severe' : 'severe'})`).join(', ')}.`;
  if (fired && fired.length) {
    // E2 — lead the red-flag mention with the highest urgency tier present.
    const rank = { emergency: 3, urgent: 2, routine: 1 };
    const top = fired.reduce((t, f) => (rank[f.urgency || 'routine'] > rank[t] ? (f.urgency || 'routine') : t), 'routine');
    const urg = top === 'emergency' ? ' — same-day assessment' : top === 'urgent' ? ' — prompt assessment' : '';
    txt += ` ⚠ ${fired.length} red-flag item${fired.length > 1 ? 's' : ''} answered Yes${urg} (see Red flags).`;
  }
  if (tri) txt += ` Suggested triage: Tier ${tri.level} — ${tri.label}.`;
  const caveat = `Screening synthesis only — not a diagnosis.${conf ? ` Confidence ${conf.level}, ${score.completeness}% complete.` : ''} Apply clinical judgement.`;
  return { txt, caveat };
}

// Pull every pelvic-floor / visceral-fascial manual-therapy candidacy out of the
// triage result (reasons + alsoConsider) — the physio-facing read this tool exists
// to surface. Matches on the axis tag OR the candidacy wording.
function physioCandidacy(tri) {
  const all = [].concat(tri.reasons || [], ...((tri.alsoConsider || []).map(a => a.reasons || [])));
  const seen = new Set();
  // axis:'pelvic' is the true manual-therapy signal. The text regex is a
  // fallback for reasons that name manual therapy explicitly without a
  // 'pelvic' axis tag (e.g. adhesion-surgery candidacy, axis:'symptom') — it
  // must NOT match "visceral" as a bare word, since constipation_dominant's
  // label uses "visceral" as GI motility jargon (not manual therapy) and would
  // otherwise mis-flag ordinary constipation as a physio candidate.
  return all.filter(r => (r.axis === 'pelvic') || /manual[- ]therapy|fascial manual|pelvic-floor/i.test(r.text || ''))
    .filter(r => { if (seen.has(r.text)) return false; seen.add(r.text); return true; });
}

function buildClinicianPrint(c) {
  const { score, sv, conf, driverExtras, patterns, fired, lens, rome, tri, profile, heads, conditions, meds, famhx, obstetric, anthro } = c;
  const dateStr = new Date().toLocaleDateString('en-AU', { year: 'numeric', month: 'long', day: 'numeric' });
  const patName = (session.name || '').trim() || 'Not recorded';
  const priors = priorVisits();
  const trendVisits = loadedVisitId ? priors : priors.concat([currentVisit()]);
  const trend = trendVisits.length >= 2 ? buildTrend(trendVisits) : null;
  const { ROME_FREQ, ROME_ONSET, ROME_ASSOC } = __req('romeiv.js');
  const isPregnant = session.pregnant === 'yes';
  const ageNum = parseInt(session.age, 10);
  const isMinor = !isNaN(ageNum) && ageNum < 18;

  const div = document.createElement('div');
  let h = `<div class="pr-logo">Enterro360 · Gut & Systemic Health Screen</div>
    <div class="pr-title">Clinical Summary</div>
    <div class="pr-meta">
      Patient: <b>${esc(patName)}</b>${session.ref ? ` · Ref: ${esc(session.ref)}` : ''}<br>
      Age: ${esc(session.age || '—')} · Gender: ${esc(session.gender || '—')}${isPregnant ? ' · <b>Pregnant</b>' : ''}${isMinor ? ' · <b>Under 18</b>' : ''}<br>
      Visit: ${session.followup ? 'Follow-up' : 'Baseline'} · Date: ${esc(dateStr)}
    </div><hr class="pr-divider">`;

  if (isPregnant || isMinor) {
    const note = isPregnant && isMinor ? 'Pregnant and under 18' : isPregnant ? 'Pregnant' : 'Under 18';
    h += `<div class="pr-info"><b>Applicability:</b> ${esc(note)}. Developed in a general adult population — interpret with clinical context.</div>`;
  }

  // ============================================================
  // PAGE 1 — At-a-glance action & overview. Everything a clinician needs to
  // decide what happens next fits on one page: the safety banner and the
  // triage/action arm are merged into a single item (1) so "what's wrong"
  // and "what to do about it" are never pages apart; the narrative summary
  // (2) and the 2-D burden matrix (3) follow.
  // ============================================================
  h += `<div class="pr-grp">Page 1 · At-a-glance action &amp; overview</div>`;

  // Item 1 — Safety banner + primary action arm (triage & next steps linked).
  h += `<div class="pr-section"><div class="pr-sh">1 · Safety banner &amp; action arm</div>`;

  // Red flags — E2: grouped by urgency tier, highest-acuity first, with a tier
  // headline so the clinician sees at a glance whether a same-day feature is present.
  if (fired.length) {
    const top = topUrgency(redflags);
    const topMeta = top ? RF_URGENCY_META[top] : null;
    const groups = firedByUrgency(redflags);
    h += `<div class="pr-alert"><div class="pr-alert-t">⚠ ${fired.length} item${fired.length > 1 ? 's' : ''} answered Yes${topMeta ? ` · highest: ${esc(topMeta.label)}` : ''}</div>`;
    if (topMeta) h += `<div style="font-size:10px;color:#7A1F1F;margin:2px 0 4px">${esc(topMeta.headline)}</div>`;
    h += groups.map(g =>
      `<div style="margin-top:4px"><div style="font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7A1F1F">${esc(g.meta.label)}</div>` +
      `<ul style="margin:2px 0 0 14px;font-size:10.5px">${g.flags.map(f => `<li>${esc(f.label)}</li>`).join('')}</ul></div>`
    ).join('');
    h += `</div>`;
  } else {
    h += `<div style="font-size:11px;color:#555;margin-bottom:6px">No red flags answered Yes.</div>`;
  }

  // Triage tier / action / investigations — the "next steps" half of the arm.
  const tierCls = ['', 't1', 't2', 't3', 't4'][tri.level] || 't4';
  h += `<div class="pr-triage ${tierCls}">
      <div style="font-weight:700">Tier ${tri.level} — ${esc(tri.label)}</div>
      <div style="margin-top:3px;font-size:11px">${esc(tri.action)}</div>
      ${tri.reasons.length ? `<div style="font-size:10.5px;margin-top:4px">Reasons: ${tri.reasons.map(r => esc(r.text)).join(' · ')}</div>` : ''}
      ${tri.alsoConsider.length ? `<div style="font-size:10.5px;margin-top:3px">Also consider: ${tri.alsoConsider.map(a => `${esc(a.label)} (${a.reasons.map(r => esc(r.text)).join('; ')})`).join(' / ')}</div>` : ''}
      ${[].concat(tri.conditionGuidance || [], tri.familyNotes || [], tri.conditionNote ? [tri.conditionNote] : [], tri.labNote ? [tri.labNote] : [], tri.autonomicNote ? [tri.autonomicNote] : [], tri.gynNote ? [tri.gynNote] : [], tri.pelvicNote ? [tri.pelvicNote] : [], tri.anthroNote ? [tri.anthroNote] : [], tri.medNote ? [tri.medNote] : [], tri.durationNote ? [tri.durationNote] : [], tri.bowelFreqNote ? [tri.bowelFreqNote] : [], tri.smokingNote ? [tri.smokingNote] : [], tri.treatmentsTriedNote ? [tri.treatmentsTriedNote] : [], tri.coeliacTimingNote ? [tri.coeliacTimingNote] : [], tri.restrictionNote ? [tri.restrictionNote] : [], tri.referredPainNote ? [tri.referredPainNote] : [], tri.restrictionScreenNote ? [tri.restrictionScreenNote] : []).map(n => `<div style="font-size:10.5px;margin-top:3px;color:#5A3A10">• ${esc(n)}</div>`).join('')}
    </div>
    ${tri.investigations && tri.investigations.length ? `
      <div style="font-weight:600;font-size:11px;margin:6px 0 3px">Suggested investigations / management:</div>
      <ul style="margin:0 0 4px 14px;font-size:10.5px;line-height:1.6">${tri.investigations.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;color:#888;font-style:italic">Pattern-matched — apply clinical judgement. Not a protocol.</div>
    ` : ''}`;

  // Physiotherapy candidacy — folded into the action arm (a distinct referral directive).
  const physio = physioCandidacy(tri);
  if (physio.length) {
    h += `<div style="margin-top:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Physiotherapy candidacy</div>
      <ul style="margin:0 0 0 14px;font-size:10.5px;line-height:1.6">${physio.map(r => `<li>${esc(r.text)}</li>`).join('')}</ul>
      <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:2px">An adjunct after medical assessment — not a substitute for it.</div></div>`;
  }

  // Modifiable drivers — folded into the action arm (a lifestyle directive, same "what to work on" register).
  h += `<div style="margin-top:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Modifiable drivers</div>
    <table class="pr-tbl"><thead><tr><th>Factor</th><th>Band</th><th>Score</th></tr></thead><tbody>
      ${modifiableFactors(driverExtras).map(f => `<tr><td>${factorIcon(f)}${esc(f.label)}</td><td style="color:${f.color}">${esc(f.band)}</td><td>${esc(f.score || '')}</td></tr>`).join('')}
    </tbody></table></div>`;
  h += `</div>`;

  // Item 2 — Executive summary (auto-synthesised narrative).
  const imp = clinicalImpression(c);
  h += `<div class="pr-section"><div class="pr-sh">2 · Executive summary</div>
    <div style="font-size:11px;line-height:1.5">${esc(imp.txt)}</div>
    <div style="font-size:9.5px;color:#888;font-style:italic;margin-top:3px">${esc(imp.caveat)}</div></div>`;

  // Item 3 — 2-D burden matrix: symptom severity × frequency. Read-only
  // cross-tab; frequency never re-enters the Index (see scoring.js) — no
  // blended "burden score" is computed here.
  h += `<div class="pr-section"><div class="pr-sh">3 · Symptom burden — severity × frequency</div>`;
  {
    const sfCells = severityFrequencyMatrix(score, driverExtras);
    if (sfCells.length) {
      const sfRows = sfCells.map(cc => {
        const sevTxt = cc.severity == null ? '—' : Math.round(cc.severity * 100) + '%';
        const freqTxt = cc.freqIdx == null ? '—' : (cc.cluster === 'Pain' ? ROME_FREQ[cc.freqIdx] : CLUSTER_FREQ_LEVELS[cc.freqIdx]) || String(cc.freqIdx);
        const q = cc.quadrant ? SEVFREQ_QUAD[cc.quadrant] : null;
        return `<tr><td style="padding:2px 6px;font-weight:600">${esc(cc.cluster)}</td>
          <td style="padding:2px 6px">${sevTxt}${cc.sevHi ? ' ▲' : ''}</td>
          <td style="padding:2px 6px">${esc(freqTxt)}${cc.freqHi ? ' ▲' : ''}</td>
          <td style="padding:2px 6px;color:${q ? q.c : '#888'}">${q ? esc(q.t) : 'incomplete'}</td></tr>`;
      }).join('');
      h += `<table class="pr-tbl"><thead><tr><th>Cluster</th><th>Severity</th><th>Frequency</th><th>Read</th></tr></thead>
        <tbody>${sfRows}</tbody></table>
        <div style="font-size:9px;color:#888;margin-top:2px">Frequency is a reported dimension only — it does not change the Index. ▲ = high. Priority = severe and frequent.</div>`;
    } else {
      h += `<div style="font-size:11px;color:#555">Not enough data yet — answer per-cluster frequency to populate this matrix.</div>`;
    }
  }
  h += `</div>`;

  // ============================================================
  // PAGE 2 — Clinical deep dive & trends: the active clinical lenses,
  // reordered so the named/actionable reads (Patterns, Rome IV subtype,
  // microbiome correlates) lead and the supporting tables (axis profile,
  // domain breakdown) plus history/context follow — then the longitudinal
  // trend engine with the intervention overlay.
  // ============================================================
  h += `<div class="pr-grp pr-page-break">Page 2 · Clinical deep dive &amp; trends</div>`;

  // Item 4 — Active clinical lenses. Named/actionable reads lead (Patterns,
  // Rome IV subtype, microbiome correlates); supporting tables (axis profile,
  // domain breakdown) and history/context follow.
  h += `<div class="pr-section"><div class="pr-sh">4 · Active clinical lenses</div>`;

  // Patterns
  if (patterns.length) {
    h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Patterns</div>
      <table class="pr-tbl"><thead><tr><th>Pattern</th><th>Data completeness</th><th>Rationale</th></tr></thead><tbody>
        ${patterns.map(p => `<tr><td><b>${esc(p.label)}</b></td><td>${esc(p.confidence)}</td><td>${esc(p.desc)}</td></tr>`).join('')}
      </tbody></table></div>`;
  }

  // Rome IV — full criteria table only when answered; otherwise a single line, so
  // an unanswered Rome IV doesn't print five empty rows.
  const r = extras.rome || {};
  // Onset falls back to sx_duration (see classifyRomeIV's own fallback) — the
  // Rome card no longer asks a separate onset question, so r.onset is null
  // for every new visit; sx_duration is the actual source of truth.
  const onsetIdx = r.onset != null ? r.onset : (typeof answers.sx_duration === 'number' ? answers.sx_duration : null);
  if (rome.answered) {
    h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Rome IV-informed bowel-pain pattern</div>
      <table class="pr-tbl"><tbody>
        <tr><td>Pain frequency</td><td>${r.painFreq != null ? `${r.painFreq} — ${esc(ROME_FREQ[r.painFreq] || '')}` : '—'}</td></tr>
        <tr><td>Onset</td><td>${onsetIdx != null ? `${onsetIdx} — ${esc(ROME_ONSET[onsetIdx] || '')}` : '—'}</td></tr>
        ${ROME_ASSOC.map(a => `<tr><td>${esc(a.label)}</td><td>${r[a.id] ? '<b>Yes</b>' : 'No'}</td></tr>`).join('')}
        <tr><td><b>Result</b></td><td><b>${rome.criteriaMet ? `Criteria met — ${esc(rome.subtype)}` : 'Criteria not met'}</b></td></tr>
      </tbody></table>
      <div style="font-size:9.5px;color:#888;margin-top:3px">Single-visit estimate — not the prospective diary Rome IV was validated against.</div>
    </div>`;
  } else {
    h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Rome IV-informed bowel-pain pattern</div>
      <div style="font-size:11px;color:#555">Not answered (pain items not reached / completed).</div></div>`;
  }

  // Microbiome correlates
  h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Microbiome-correlate signals (${lens.count}/6)</div>`;
  h += lens.signals && lens.signals.length
    ? `<ul style="margin:0 0 0 14px;font-size:10.5px">${lens.signals.map(s => `<li>${esc(s.label)}</li>`).join('')}</ul>`
    : `<div style="font-size:11px;color:#555">No microbiome-correlate signals present.</div>`;
  h += `</div>`;

  // Axis profile — primary + secondary in ONE table with band colour + provenance,
  // so the validated Gut Symptom Burden is visibly distinguished from the draft
  // screening axes. disruption_load / dysbiosis_correlate_load are signal counts
  // (0–6), not percentages; all other axis values are 0–100%.
  const COUNT_LOADS = new Set(['disruption_load', 'dysbiosis_correlate_load']);
  const pctOrCount = (o) => o.value == null ? '—'
    : (o.max != null ? `${o.value}/${o.max}`
      // E3 — the Dysbiosis Correlate Load shows the weighted Dys-R tier alongside the
      // raw signal count, so a clinician sees strength-of-evidence, not just how many.
      : (o.key === 'dysbiosis_correlate_load' && o.tier
          ? `${o.value} signal${o.value === 1 ? '' : 's'} · Dys-R ${o.tier}${o.weightedScore != null ? ` (${o.weightedScore})` : ''}`
          : (COUNT_LOADS.has(o.key) ? `${o.value} signal${o.value === 1 ? '' : 's'}` : o.value + '%')));
  const axisRow = (o) => `<tr><td>${esc(o.label)}</td><td style="white-space:nowrap"><b>${esc(String(pctOrCount(o)))}</b></td><td>${prBandPill(o.band)}</td><td>${prProv(o.validated)}</td></tr>`;
  h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Axis profile</div>
    <table class="pr-tbl"><thead><tr><th>Axis</th><th>Value</th><th>Band</th><th>Basis</th></tr></thead><tbody>
      <tr><td colspan="4" style="font-size:9px;color:#888;font-weight:600">PRIMARY</td></tr>
      ${heads.primaryList.map(axisRow).join('')}
      <tr><td colspan="4" style="font-size:9px;color:#888;font-weight:600;padding-top:4px">SECONDARY</td></tr>
      ${heads.secondaryList.map(axisRow).join('')}
      <tr><td>Confidence</td><td colspan="3">${esc(conf.level)} · ${score.completeness}% complete</td></tr>
      ${score.coreUnknown ? '<tr><td colspan="4" style="color:#A32D2D;font-weight:600">⚠ Core GI section not answered — Gut Symptom Burden provisional</td></tr>' : ''}
      ${(score.peakAlerts && score.peakAlerts.length) ? `<tr><td colspan="4" style="color:#A32D2D;font-weight:600">⚠ Peak-symptom alert: ${esc(score.peakAlerts.map(p => `${p.label} (${p.level === 'ceiling' ? 'very severe' : 'severe'})`).join(', '))}${score.peakEscalated ? ' — displayed band raised; raw index unchanged' : ''}</td></tr>` : ''}
    </tbody></table></div>`;

  // GSRS domain breakdown — % cell colour-coded by band so high domains stand out.
  h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Domain breakdown</div>
    <table class="pr-tbl"><thead><tr><th>Domain</th><th>Score/Max</th><th>%</th></tr></thead><tbody>`;
  SECTIONS.forEach(s => {
    const sc = score.secScores[s.id] || 0, mx = score.secApplicableMax[s.id] || 0;
    // GI's % matches the headline Index (cluster-balanced); Score/Max stays the
    // raw item tally for transparency — the two are allowed to look inconsistent
    // (see the Bristol-transit note above), that's the point of showing both.
    const giNorm = s.id === 'GI' ? score.secNorm.GI : null;
    const pct = giNorm != null ? Math.round(giNorm * 100) : (mx ? Math.round(sc / mx * 100) : null);
    const bnd = pct != null ? bandForPct(pct) : null;
    h += `<tr><td>${esc(s.full || s.label)}</td><td>${sc}/${mx}</td><td>${pct != null ? `<b style="color:${bnd.color}">${pct}%</b>` : 'n/a'}</td></tr>`;
  });
  if (score.clusterAgg) {
    ['Reflux', 'Pain', 'Indigestion', 'Diarrhoea', 'Constipation'].forEach(k => {
      const cl = score.clusterAgg[k]; if (!cl || cl.max === 0) return;
      const pct = Math.round(cl.sum / cl.max * 100);
      h += `<tr><td style="padding-left:14px;color:#666">↳ ${esc(k)}</td><td>${cl.sum}/${cl.max}</td><td style="color:${bandForPct(pct).color}">${pct}%</td></tr>`;
    });
  }
  h += `</tbody></table></div>`;

  // History / context supporting the lenses above.
  if (conditions && conditions.list && conditions.list.length) {
    h += `<div style="margin-bottom:6px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Known conditions reported</div>
      <div style="font-size:10.5px">${esc(conditions.list.join(', '))}</div></div>`;
  }
  if (famhx && famhx.list && famhx.list.length) {
    h += `<div style="margin-bottom:6px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Family history</div>
      <div style="font-size:10.5px">${esc(famhx.list.join(', '))}</div></div>`;
  }
  if (obstetric && obstetric.list && obstetric.list.length) {
    h += `<div style="margin-bottom:6px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Obstetric / birth history</div>
      <div style="font-size:10.5px">${esc(obstetric.list.join(', '))}</div></div>`;
  }
  if (anthro && (anthro.bmi != null || anthro.whtr != null)) {
    const bmiTxt = anthro.bmi != null ? `BMI ${anthro.bmi}${anthro.bmiBand ? ` (${anthro.bmiBand})` : ''}` : null;
    const whtrTxt = anthro.whtr != null ? `Waist-to-height ${anthro.whtr}${anthro.whtrBand ? ` (${anthro.whtrBand})` : ''}` : null;
    h += `<div style="margin-bottom:6px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Anthropometrics</div>
      <div style="font-size:10.5px">${esc([bmiTxt, whtrTxt].filter(Boolean).join(' · '))}${anthro.caveat ? `<br><i>${esc(anthro.caveat)}</i>` : ''}</div></div>`;
  }
  const medsOtherTxt = (driverExtras && driverExtras.medsOther || '').trim();
  if ((meds && meds.list && meds.list.length) || medsOtherTxt) {
    h += `<div style="margin-bottom:6px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Medication confounders</div>`;
    if (meds && meds.list && meds.list.length) h += `<div style="font-size:10.5px">${esc(meds.list.map(m => m.label + (m.effect ? ` (${m.effect})` : '')).join('; '))}</div>`;
    if (medsOtherTxt) h += `<div style="font-size:10.5px${meds && meds.list && meds.list.length ? ';margin-top:2px' : ''}">Other reported medications: ${esc(medsOtherTxt)}</div>`;
    h += `</div>`;
  }
  h += `</div>`;

  // Item 5 — Longitudinal trend engine & intervention overlay: what was
  // tried this visit, then the full progression with interventions overlaid
  // per point so burden change reads against what was actually tried.
  h += `<div class="pr-section"><div class="pr-sh">5 · Longitudinal trend &amp; intervention overlay</div>`;

  // Tranche G — interventions recorded at THIS visit (annotation only).
  {
    const ivNow = interventionSummary(driverExtras);
    h += `<div style="margin-bottom:8px;page-break-inside:avoid;break-inside:avoid"><div style="font-weight:600;font-size:11px;margin-bottom:2px">Interventions this visit</div>
      <div style="font-size:11px">${ivNow ? esc(ivNow) : '<span style="color:#555">None recorded this visit.</span>'}</div></div>`;
  }

  // Longitudinal trend (if applicable). Tranche G — interventions overlaid per
  // visit so burden change reads against what was tried.
  if (trend && trend.points.length >= 2) {
    const sortedTrendVisits = trendVisits.slice().sort((a, b) => (a.date || 0) - (b.date || 0));
    h += `<div><div style="font-weight:600;font-size:11px;margin-bottom:2px">Longitudinal progression (${trend.points.length} visits)</div>
      <table class="pr-tbl"><thead><tr><th>#</th><th>Date</th><th>Type</th><th>Index</th><th>Band</th><th>Δ</th><th>Interventions</th></tr></thead><tbody>
        ${trend.points.map((p, i) => {
          const d = p.date ? new Date(p.date).toISOString().slice(0, 10) : '—';
          const dTxt = p.delta ? `${p.delta.delta > 0 ? '+' : ''}${p.delta.delta} (${esc(p.delta.label)})` : '—';
          const idxTxt = p.index != null ? `${p.index}%` : '—';
          const bandTxt = p.band != null ? esc(p.band) : 'Not completed';
          const iv = interventionSummary(sortedTrendVisits[i] && sortedTrendVisits[i].extras);
          return `<tr><td>${i + 1}</td><td>${esc(d)}</td><td>${p.followup ? 'Follow-up' : 'Baseline'}</td><td>${idxTxt}</td><td>${bandTxt}</td><td>${dTxt}</td><td>${iv ? esc(iv) : '—'}</td></tr>`;
        }).join('')}
      </tbody></table>
      ${trend.persistent.length ? `<div style="font-size:10.5px;margin-top:4px">Persistent patterns: <b>${trend.persistent.map(id => esc(id.replace(/_/g, ' '))).join(', ')}</b></div>` : ''}
    </div>`;
  } else {
    h += `<div style="font-size:11px;color:#555">No prior visits to trend against yet.</div>`;
  }
  h += `</div>`;

  // ============================================================
  // PAGE 3+ — reference appendix: full item-level questionnaire responses.
  // Optional reference material for a clinician who wants to see exactly
  // what the patient answered; everything clinically actionable is already
  // synthesised in items 1–5 above.
  // ============================================================
  h += `<div class="pr-grp pr-page-break">Page 3+ · Reference appendix</div>`;
  h += `<div class="pr-section"><div class="pr-sh">6 · Full item-level Q&amp;A</div>
    <div style="font-size:9.5px;color:#888;font-style:italic;margin-bottom:6px">Reference only — every item answer, for clinicians who want to see exactly what was reported. Not required reading; all clinically actionable reads are in Items 1–5 above.</div>
    <div style="column-count:2;column-gap:16px">`;
  SECTIONS.forEach(s => {
    const qs = questionsOf(s.id);
    if (!qs.length) return;
    const sc = score.secScores[s.id] || 0, mx = score.secApplicableMax[s.id] || 0;
    h += `<div style="break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:6px">
      <div style="font-weight:600;font-size:10.5px;margin:0 0 2px;color:#3A4A5A">${esc(s.full || s.label)} — ${sc}/${mx} (${mx ? Math.round(sc / mx * 100) + '%' : 'n/a'})</div>
      <table class="pr-tbl"><tbody>${qs.map(q => {
        const val = answers[q.id];
        const labels = scaleFor(q.scale);
        const disp = q.freeText
          ? (typeof val === 'string' && val.trim() ? esc(val) : '—')
          : val === 'na' ? 'N/A' : val == null ? '—' : `${val} — ${esc(labels[val] || '')}`;
        const ansStyle = q.freeText ? 'font-size:9.5px;white-space:normal;word-break:break-word' : 'white-space:nowrap;font-size:9.5px';
        return `<tr><td style="font-size:9.5px">${esc(q.patientText)}</td><td style="${ansStyle}">${disp}</td></tr>`;
      }).join('')}</tbody></table></div>`;
  });
  h += `</div></div>`;

  h += `<div class="pr-footer">Clinical summary — Enterro360 · Gut & Systemic Health Screen · ${esc(dateStr)}<br>Screening tool only — not a diagnosis or prescription. Apply clinical judgement.</div>`;
  div.innerHTML = h;
  return div;
}

// Start a fresh questionnaire, optionally pre-bound to a patient identity (and
// flagged as a follow-up). Used by the Patient-records tab's New-questionnaire /
// New-follow-up actions. identity = { name, age, gender, ref } (all optional).
function newVisitFor(identity, followup) {
  reset();
  const id = identity || {};
  session.name = id.name || '';
  session.age = id.age || '';
  session.gender = id.gender || '';
  session.ref = id.ref || '';
  session.pregnant = id.pregnant || ''; // clear on each new patient; not stored in patient record
  session.followup = !!followup;
  render();
}

// Load a SAVED visit back into the live questionnaire state (answers, drivers,
// red flags) and bind the patient identity. Used by the Patient-records tab.
// showResults=true populates lastCalc so the Clinician tab can show the summary
// WITHOUT dumping the editable questionnaire + results inline; the caller routes
// to the Clinician tab. showResults=false loads the answers for editing.
function loadVisit(identity, visit, showResults) {
  const id = identity || {}, v = visit || {};
  answers = { ...(v.answers || {}) };
  redflags = { ...(v.redflags || {}) };
  // Re-hydrate extras onto a fresh blank so visits saved on an older schema
  // (missing newer nested keys) still render every driver.
  const saved = v.extras ? JSON.parse(JSON.stringify(v.extras)) : {};
  extras = Object.assign(blankExtras(), saved);
  extras.meds  = Object.assign(blankExtras().meds, saved.meds || {});
  extras.dys   = Object.assign(blankExtras().dys,  saved.dys  || {});
  extras.rome  = Object.assign(blankExtras().rome, saved.rome || {});
  extras.clusterFreq = Object.assign(blankExtras().clusterFreq, saved.clusterFreq || {});
  session.name = id.name || '';
  session.age = id.age || '';
  session.gender = id.gender || '';
  session.ref = id.ref || '';
  // Restore the per-visit applicability flag so the Pregnant banner/caveat
  // survives a saved-visit reload/print. Older visits saved before this field
  // existed fall back to '' (unknown) — a stale patient-level guess would be
  // worse than showing no caveat.
  session.pregnant = v.pregnant || '';
  session.followup = !!v.followup;
  loadedVisitId = v.id || null;  // save → update this record in-place
  render();
  // Populate lastCalc so the Clinician tab renders the summary on demand. We do
  // NOT call calc() here — that would append results under the editable form
  // (the spill the records "View results" flow is meant to avoid).
  if (showResults) lastCalc = computeAll();
}

// Clinician tab — detailed results + management plan for the current screen
// (lastCalc), with a dedicated clinician print. Populated by running a
// questionnaire or opening a saved visit (Patient records → View results).
function renderClinician() {
  const root = document.getElementById('mode-clinician');
  if (!root) return;
  root.innerHTML = '';
  root.appendChild(el('div', { class: 'intro' },
    '<b>Clinician &amp; physiotherapist workspace.</b> Gut and systemic axes side-by-side, with a manual-therapy candidacy read (prior abdominal/pelvic surgery → visceral / fascial Tier-2) for whole-person screening. ' +
    'Run a questionnaire, or open a saved visit from Patient records (“View results”), to populate this view.'));

  if (!lastCalc) {
    root.appendChild(el('div', { class: 'card' },
      '<div class="empty-note">🩺<br>No screen loaded yet.<br>' +
      '<span class="muted">Complete a questionnaire or open a saved visit to see the clinician view and plan.</span></div>'));
    return;
  }
  const c = lastCalc;
  const { score, sv, conf, lens, rome, tri, profile, heads, correlateLoad, fired, driverExtras } = c;

  // Identity + print header
  const who = (session.name || '').trim() || (session.ref || '').trim() || 'Anonymous screen';
  const meta = [];
  if (session.age) meta.push('Age ' + esc(String(session.age)));
  if (session.gender) meta.push(esc(session.gender));
  if (session.ref) meta.push('Ref: ' + esc(session.ref));
  if (session.pregnant === 'yes') meta.push('Pregnant');
  meta.push(session.followup ? 'Follow-up' : 'Baseline');
  const head = el('div', { class: 'card row', style: 'justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap' });
  head.appendChild(el('div', {},
    `<div style="font-weight:700;font-size:16px">👤 ${esc(who)}</div>
     <div class="q-sub" style="margin:2px 0 0">${meta.join(' · ')}</div>`));
  // Both prints offered here so a visit loaded from Patient records can produce
  // the patient-facing summary as well as the clinician report.
  const printBtns = el('div', { class: 'row', style: 'gap:8px;flex-wrap:wrap' });
  const ptBtn = el('button', { class: 'btn btn-gh', type: 'button' }, '🖨 Patient summary');
  ptBtn.onclick = () => printSummary('patient');
  const printBtn = el('button', { class: 'btn btn-g', type: 'button' }, '🖨 Clinician report');
  printBtn.onclick = () => printSummary('clinician');
  printBtns.appendChild(ptBtn);
  printBtns.appendChild(printBtn);
  head.appendChild(printBtns);
  root.appendChild(head);

  // ============================================================
  // PAGE 1 — At-a-glance action & overview. The safety banner and the
  // triage/action arm are merged into item 1 so "what's wrong" and "what to
  // do about it" are never apart; the narrative summary (2) and the 2-D
  // burden matrix (3) follow.
  // ============================================================
  root.appendChild(el('div', { class: 'rpt-grp' }, 'Page 1 · At-a-glance action &amp; overview'));

  // Item 1 — Safety banner + primary action arm.
  root.appendChild(el('div', { class: 'grp-label' }, '1 · Safety banner &amp; action arm'));
  const rfCard = el('div', { class: 'card', style: `border-left:6px solid ${fired.length ? '#A32D2D' : '#0F6E56'}` });
  rfCard.appendChild(el('h2', {}, 'Red flags'));
  if (fired.length) {
    // E2 — group by urgency tier off the fired flag objects (each carries `urgency`).
    const rank = { emergency: 3, urgent: 2, routine: 1 };
    const top = fired.reduce((t, f) => (rank[f.urgency || 'routine'] > rank[t] ? (f.urgency || 'routine') : t), 'routine');
    const topMeta = RF_URGENCY_META[top];
    rfCard.appendChild(el('div', { style: 'font-weight:700;color:#A32D2D;font-size:13px' },
      `⚠ ${fired.length} item${fired.length > 1 ? 's' : ''} answered Yes · highest: ${esc(topMeta.label)}`));
    rfCard.appendChild(el('div', { style: 'font-size:11px;color:#7A1F1F;margin:2px 0 4px' }, esc(topMeta.headline)));
    ['emergency', 'urgent', 'routine'].forEach(tier => {
      const grp = fired.filter(f => (f.urgency || 'routine') === tier);
      if (!grp.length) return;
      rfCard.appendChild(el('div', { style: 'font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#7A1F1F;margin-top:6px' }, esc(RF_URGENCY_META[tier].label)));
      rfCard.appendChild(el('ul', { style: 'font-size:12.5px;padding-left:18px;color:#A32D2D;margin:2px 0 0' },
        grp.map(f => `<li>${esc(f.label)}</li>`).join('')));
    });
  } else {
    rfCard.appendChild(el('div', { class: 'q-sub' }, 'No red flags answered Yes.'));
  }
  root.appendChild(rfCard);

  // Plan (triage + investigations) — the "next steps" half of the arm.
  root.appendChild(triageCard(tri, rome, true));

  // Physiotherapy candidacy — folded into the action arm.
  const physio = physioCandidacy(tri);
  if (physio.length) {
    const phCard = el('div', { class: 'card', style: 'border-left:6px solid #7A4A8C' });
    phCard.appendChild(el('h2', {}, 'Physiotherapy candidacy'));
    phCard.appendChild(el('ul', { style: 'font-size:12.5px;padding-left:18px;margin:2px 0' },
      physio.map(r => `<li>${esc(r.text)}</li>`).join('')));
    phCard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:2px;font-style:italic' },
      'An adjunct after medical assessment — not a substitute for it.'));
    root.appendChild(phCard);
  }

  // Modifiable drivers — folded into the action arm.
  root.appendChild(modifiableDriversCard(driverExtras));

  // Item 2 — Executive summary (auto-synthesised narrative) + headline numbers.
  root.appendChild(el('div', { class: 'grp-label' }, '2 · Executive summary'));
  const imp = clinicalImpression(c);
  const impCard = el('div', { class: 'card', style: 'border-left:6px solid #185FA5' });
  impCard.appendChild(el('h2', {}, 'Executive summary'));
  impCard.appendChild(el('div', { style: 'font-size:13px;line-height:1.5' }, esc(imp.txt)));
  impCard.appendChild(el('div', { class: 'q-sub', style: 'margin-top:4px;font-style:italic' }, esc(imp.caveat)));
  root.appendChild(impCard);

  root.appendChild(headlineCard(heads, rome));
  const hero = el('div', { class: 'card' });
  const peaks = score.peakAlerts || [];
