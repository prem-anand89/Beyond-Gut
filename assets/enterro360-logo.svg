<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140" role="img" aria-label="Enterro360 logo">
  <defs>
    <linearGradient id="e360ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F6E56"/>
      <stop offset="1" stop-color="#17A67E"/>
    </linearGradient>
    <linearGradient id="e360gut" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17A67E"/>
      <stop offset="1" stop-color="#3FBF9A"/>
    </linearGradient>
  </defs>

  <!-- Mark: a 360° ring (holistic, whole-body view) with a small gap that reads
       as motion, wrapped around a continuous gut coil (the enteric core). -->
  <g transform="translate(70 70)">
    <!-- 360° ring, open at the top-right to imply rotation / a full sweep -->
    <path d="M 40 -20 A 46 46 0 1 1 20 -42"
          fill="none" stroke="url(#e360ring)" stroke-width="9" stroke-linecap="round"/>
    <!-- arrow head closing the 360 sweep -->
    <path d="M 20 -42 l 14 -3 l -6 13 z" fill="#0F6E56"/>
    <!-- enteric coil: one continuous looping line = the gut -->
    <path d="M -22 16
             C -30 2 -14 -6 -4 2
             C 6 10 -6 20 2 24
             C 12 29 22 16 18 4
             C 15 -6 2 -14 -8 -18"
          fill="none" stroke="url(#e360gut)" stroke-width="8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(140 82)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="0" y="0" font-size="42" font-weight="700" fill="#123">Enterro<tspan fill="#0F6E56">360</tspan></text>
    <text x="2" y="26" font-size="14.5" font-weight="500" fill="#5A6B66" letter-spacing="0.5">Gut &amp; Systemic Health Screen</text>
  </g>
</svg>
