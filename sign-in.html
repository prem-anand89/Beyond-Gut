<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Enterro360</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      color: #16324F;
      margin-bottom: 8px;
    }

    .logo p {
      font-size: 14px;
      color: #666;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 30px 0;
    }

    .auth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #efefef;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
      color: #999;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Enterro360</h1>
      <p>Gut & Systemic Health Screen</p>
    </div>

    <div class="info-box">
      <strong>Clinical screening platform</strong> for assessing gut and systemic health in primary care.
    </div>

    <div class="auth-buttons">
      <button class="btn btn-primary" onclick="handleSignIn()">
        <span>🔐</span>
        Sign In with Your Account
      </button>
      <button class="btn btn-secondary" onclick="handleSignUp()">
        <span>✨</span>
        Create New Account
      </button>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <p>Secure authentication powered by Clerk</p>
    </div>
  </div>

  <script>
    // Clerk will be injected here
    // This page is a placeholder; Clerk's hosted UI will handle actual auth

    function handleSignIn() {
      // Redirect to Clerk's sign-in page
      // The actual implementation will use Clerk's hosted UI or pre-built components
      window.location.href = '/sign-in-clerk';
    }

    function handleSignUp() {
      // Redirect to Clerk's sign-up page
      window.location.href = '/sign-up-clerk';
    }

    // Check if already signed in
    async function checkAuth() {
      try {
        const response = await fetch('/api/auth/session');
        if (response.ok) {
          const session = await response.json();
          if (session.userId) {
            // Already signed in, redirect to app
            window.location.href = '/';
          }
        }
      } catch (err) {
        console.log('Not signed in yet');
      }
    }

    checkAuth();
  </script>
</body>
</html>
